<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevMaster — Apprends le Web de Zéro à Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e17;
  --paper: #fffcf5;
  --paper2: #f5f0e8;
  --paper3: #ede7d9;
  --accent: #e8390e;
  --accent2: #1a6b3a;
  --accent3: #1d4ed8;
  --gold: #c47d0e;
  --muted: #7a6f5e;
  --border: #ddd5c0;
  --code-bg: #1a1814;
  --code-text: #f5f0e8;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--ink);
  color: var(--paper);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform .3s ease;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.logo-mark {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.logo-mark span { color: var(--accent); }
.logo-sub {
  font-size: .72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  margin-top: 4px;
  font-family: var(--mono);
}

/* GLOBAL PROGRESS */
.sidebar-progress {
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sp-label {
  font-size: .75rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  font-family: var(--mono);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.sp-bar {
  height: 4px;
  background: rgba(255,255,255,.1);
  border-radius: 999px;
  overflow: hidden;
}
.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 999px;
  transition: width .5s ease;
  width: 0%;
}

/* NAV */
.sidebar-nav { padding: 12px 0; flex: 1; }

.nav-section-label {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
  padding: 16px 24px 6px;
}

.nav-module {
  margin-bottom: 2px;
}

.nav-module-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 24px;
  background: none;
  border: none;
  color: rgba(255,255,255,.65);
  font-family: var(--sans);
  font-size: .88rem;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.nav-module-btn:hover { background: rgba(255,255,255,.05); color: #fff; }
.nav-module-btn.active { background: rgba(255,255,255,.08); color: #fff; border-left-color: var(--accent); }

.nav-module-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; }

.nav-lessons {
  display: none;
  padding: 4px 0 8px 58px;
}
.nav-module.open .nav-lessons { display: block; }

.nav-lesson-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 6px 12px 6px 0;
  background: none;
  border: none;
  color: rgba(255,255,255,.4);
  font-family: var(--sans);
  font-size: .82rem;
  cursor: pointer;
  text-align: left;
  transition: color .15s;
  border-radius: 6px;
}
.nav-lesson-btn:hover { color: rgba(255,255,255,.8); }
.nav-lesson-btn.active { color: #fff; }
.nav-lesson-btn.done { color: rgba(255,255,255,.55); }
.nav-lesson-btn.done .nlb-check { background: var(--accent2); border-color: var(--accent2); color: #fff; }

.nlb-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem;
  flex-shrink: 0;
}
.nlb-text { line-height: 1.3; }

/* MAIN */
.main {
  margin-left: 300px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(255,252,245,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}
.topbar-breadcrumb {
  font-size: .82rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-breadcrumb strong { color: var(--ink); font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.btn-complete {
  background: var(--accent2);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity .2s, transform .1s;
}
.btn-complete:hover { opacity: .9; }
.btn-complete:active { transform: scale(.97); }
.btn-complete.done { background: var(--muted); }

/* LESSON CONTENT */
.lesson-view {
  max-width: 820px;
  margin: 0 auto;
  padding: 56px 40px 100px;
  width: 100%;
}

.lesson-header-area {
  margin-bottom: 48px;
}

.lh-module-tag {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 16px;
}

.lh-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 16px;
}

.lh-intro {
  font-size: 1.15rem;
  color: var(--muted);
  line-height: 1.75;
  max-width: 680px;
  border-left: 4px solid var(--border);
  padding-left: 20px;
  font-style: italic;
  font-family: var(--serif);
}

.lh-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 24px;
  font-size: .82rem;
  color: var(--muted);
  font-family: var(--mono);
}
.lh-meta span { display: flex; align-items: center; gap: 6px; }

/* CONTENT BLOCKS */
.content-section {
  margin-bottom: 48px;
}

.content-section h2 {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 12px;
}
.content-section h2::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.content-section h3 {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 700;
  margin: 28px 0 12px;
  color: var(--ink);
}

.content-section p {
  font-size: 1rem;
  line-height: 1.85;
  color: #2d2820;
  margin-bottom: 16px;
}

.content-section ul, .content-section ol {
  padding-left: 24px;
  margin-bottom: 18px;
}
.content-section li {
  font-size: 1rem;
  line-height: 1.8;
  color: #2d2820;
  margin-bottom: 6px;
}

/* CALLOUT BOXES */
.callout {
  border-radius: 12px;
  padding: 20px 24px;
  margin: 24px 0;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.callout-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
.callout-body { flex: 1; }
.callout-body strong { display: block; font-weight: 700; margin-bottom: 6px; font-size: .95rem; }
.callout-body p { font-size: .92rem; line-height: 1.7; margin: 0; }
.callout-body p + p { margin-top: 8px; }

.callout.analogy { background: #fef9ec; border: 1px solid #f5d87a; }
.callout.analogy .callout-body strong { color: var(--gold); }
.callout.tip { background: #edf7f1; border: 1px solid #a8e0bc; }
.callout.tip .callout-body strong { color: var(--accent2); }
.callout.warning { background: #fff4f2; border: 1px solid #fbbcb2; }
.callout.warning .callout-body strong { color: var(--accent); }
.callout.concept { background: #eef2ff; border: 1px solid #b8c7f5; }
.callout.concept .callout-body strong { color: var(--accent3); }

/* CODE BLOCKS */
.code-block {
  margin: 24px 0;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
}
.code-header {
  background: #2a2520;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.code-dots { display: flex; gap: 6px; }
.code-dots span { width: 12px; height: 12px; border-radius: 50%; }
.code-dots .d1 { background: #ff5f57; }
.code-dots .d2 { background: #ffbd2e; }
.code-dots .d3 { background: #28ca41; }
.code-lang {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}
.code-filename {
  font-family: var(--mono);
  font-size: .78rem;
  color: rgba(255,255,255,.5);
}
pre {
  background: var(--code-bg);
  padding: 24px;
  overflow-x: auto;
  margin: 0;
}
code {
  font-family: var(--mono);
  font-size: .86rem;
  line-height: 1.85;
  color: var(--code-text);
}

/* ── Inline code (hors blocs pre) ── */
:not(pre) > code {
  font-family: var(--mono);
  font-size: .82em;
  font-weight: 600;
  color: #c0370a;
  background: rgba(232,57,14,.09);
  border: 1.5px solid rgba(232,57,14,.22);
  border-radius: 5px;
  padding: 2px 7px;
  line-height: 1.5;
  white-space: nowrap;
  display: inline;
}

/* Dans les annotations sombres */
.ann-text :not(pre) > code,
.callout-body :not(pre) > code {
  color: #ffb347;
  background: rgba(255,179,71,.14);
  border-color: rgba(255,179,71,.28);
}

/* Dans checklists et étapes */
.exercise-tasks :not(pre) > code,
.project-checklist :not(pre) > code,
.step-desc :not(pre) > code,
.ps-desc :not(pre) > code,
.ms-desc :not(pre) > code {
  color: #1a5c8a;
  background: rgba(29,78,216,.09);
  border-color: rgba(29,78,216,.2);
  white-space: normal;
}

/* Dans les questions de quiz */
.quiz-q-text :not(pre) > code {
  color: #6d28d9;
  background: rgba(109,40,217,.09);
  border-color: rgba(109,40,217,.22);
}

/* Dans le texte courant des leçons */
.content-section p :not(pre) > code,
.content-section li :not(pre) > code,
.lh-intro :not(pre) > code {
  color: #b5390a;
  background: rgba(232,57,14,.08);
  border-color: rgba(232,57,14,.2);
}

/* SYNTAX HIGHLIGHTING */
.kw  { color: #ff7eb6; font-weight: 500; }
.str { color: #b5ea8c; }
.fn  { color: #ffd580; }
.cm  { color: #5c6370; font-style: italic; }
.num { color: #ff9d64; }
.tag { color: #ff7eb6; }
.attr{ color: #ffd580; }
.val { color: #b5ea8c; }
.sel { color: #73d0ff; }
.prop{ color: #73d0ff; }
.unit{ color: #ff9d64; }
.cls { color: #ffd580; }
.id  { color: #ff9d64; }

/* CODE ANNOTATION */
.code-annotation {
  background: var(--code-bg);
  padding: 0 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ann-line {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: .82rem;
  color: rgba(255,255,255,.55);
  font-family: var(--mono);
  border-top: 1px solid rgba(255,255,255,.06);
  padding-top: 8px;
}
.ann-line:first-child { border-top: none; padding-top: 0; }
.ann-num { color: var(--accent); font-weight: 700; flex-shrink: 0; min-width: 20px; }
.ann-text { line-height: 1.5; }

/* STEP BY STEP */
.steps {
  counter-reset: step;
  display: flex;
  flex-direction: column;
  gap: 0;
  margin: 24px 0;
  position: relative;
}
.steps::before {
  content: '';
  position: absolute;
  left: 19px;
  top: 40px;
  bottom: 20px;
  width: 2px;
  background: var(--border);
}
.step {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 16px 0;
  position: relative;
}
.step-num {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: .85rem;
  font-weight: 700;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.step-body { flex: 1; padding-top: 8px; }
.step-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.step-desc { font-size: .92rem; color: var(--muted); line-height: 1.7; }

/* COMPARISON TABLE */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: .9rem;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.compare-table th {
  background: var(--ink);
  color: #fff;
  padding: 14px 20px;
  text-align: left;
  font-family: var(--mono);
  font-size: .78rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
}
.compare-table td {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:nth-child(even) td { background: var(--paper2); }

/* QUIZ */
.quiz-section {
  background: var(--paper2);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin: 36px 0;
}
.quiz-title {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.quiz-subtitle {
  font-size: .9rem;
  color: var(--muted);
  margin-bottom: 24px;
}
.quiz-question {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
}
.quiz-q-text {
  font-weight: 600;
  margin-bottom: 16px;
  font-size: 1rem;
  line-height: 1.5;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.quiz-opt {
  background: var(--paper2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: .92rem;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
  font-family: var(--sans);
  color: var(--ink);
  line-height: 1.4;
}
.quiz-opt:hover { border-color: var(--accent3); background: #eef2ff; }
.quiz-opt.correct { border-color: var(--accent2); background: #edf7f1; color: var(--accent2); font-weight: 600; }
.quiz-opt.wrong { border-color: var(--accent); background: #fff4f2; color: var(--accent); }
.quiz-feedback {
  display: none;
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: .88rem;
  line-height: 1.6;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: #edf7f1; color: #1a6b3a; }
.quiz-feedback.ko { background: #fff4f2; color: #c0290e; }

/* EXERCISE */
.exercise-box {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 32px;
  margin: 36px 0;
  background: var(--paper2);
}
.exercise-tag {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}
.exercise-title {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.exercise-desc { font-size: .95rem; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
.exercise-tasks { list-style: none; padding: 0; }
.exercise-tasks li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: .92rem;
}
.exercise-tasks li:last-child { border-bottom: none; }
.task-check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .7rem; transition: all .2s; margin-top: 2px; }
.task-check.done { background: var(--ink); border-color: var(--ink); color: #fff; }

/* PROGRESS BAR IN LESSON */
.lesson-progress {
  position: fixed;
  top: 60px;
  left: 300px;
  right: 0;
  height: 3px;
  background: transparent;
  z-index: 40;
}
.lesson-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .1s;
  width: 0%;
}

/* HOME SCREEN */
.home-view {
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 40px 100px;
}

.home-hero {
  margin-bottom: 64px;
}

.home-eyebrow {
  font-family: var(--mono);
  font-size: .75rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}

.home-title {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -2px;
  margin-bottom: 24px;
}
.home-title em { font-style: italic; color: var(--accent); }

.home-desc {
  font-size: 1.1rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 620px;
  margin-bottom: 36px;
}

.home-promise {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 56px;
}
.promise-card {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}
.promise-icon { font-size: 1.8rem; margin-bottom: 12px; }
.promise-title { font-family: var(--sans); font-weight: 700; margin-bottom: 6px; font-size: .95rem; }
.promise-desc { font-size: .85rem; color: var(--muted); line-height: 1.6; }

.modules-overview { display: flex; flex-direction: column; gap: 16px; }

.module-overview-card {
  background: var(--paper);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 24px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
}
.module-overview-card:hover { border-color: var(--ink); box-shadow: 4px 4px 0 var(--ink); transform: translate(-2px, -2px); }

.moc-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
.moc-body { flex: 1; }
.moc-number { font-family: var(--mono); font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.moc-title { font-family: var(--sans); font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; }
.moc-desc { font-size: .85rem; color: var(--muted); }
.moc-count { font-family: var(--mono); font-size: .78rem; color: var(--muted); flex-shrink: 0; }

.moc-bar-wrap { width: 80px; }
.moc-bar { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
.moc-bar-fill { height: 100%; border-radius: 999px; transition: width .5s; }

/* MOBILE TOGGLE */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px; right: 24px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}

/* NAV ARROWS */
.lesson-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 32px 0;
  border-top: 1px solid var(--border);
  margin-top: 48px;
}
.nav-arrow {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-family: var(--sans);
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink);
  transition: all .15s;
}
.nav-arrow:hover { border-color: var(--ink); background: var(--ink); color: #fff; }
.nav-arrow:disabled { opacity: .3; cursor: not-allowed; }
.nav-arrow:disabled:hover { border-color: var(--border); background: none; color: var(--ink); }

/* DIAGRAM */
.diagram {
  background: var(--paper3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin: 24px 0;
  text-align: center;
}
.diagram-title { font-family: var(--mono); font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }

.box-diagram { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; align-items: center; }
.dbox { border: 2px solid; border-radius: 10px; padding: 12px 20px; font-size: .88rem; font-weight: 600; line-height: 1.3; text-align: center; min-width: 100px; }
.darrow { font-size: 1.4rem; color: var(--muted); display: flex; align-items: center; }

/* SCROLL */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

/* ══════════════════════════════════════════
   RESPONSIVE — TABLET (≤ 900px)
══════════════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar { width: 260px; }
  .main { margin-left: 260px; }
  .lesson-progress { left: 260px; }
  .lesson-view { padding: 40px 28px 80px; }
  .home-view { padding: 40px 28px 80px; }
  .topbar { padding: 0 24px; }
  .home-promise { grid-template-columns: 1fr 1fr; }
  .compare-table { font-size: .82rem; }
  .compare-table th, .compare-table td { padding: 10px 14px; }
}

/* ══════════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 768px)
══════════════════════════════════════════ */
@media (max-width: 768px) {

  /* ── Sidebar : drawer off-canvas ── */
  .sidebar {
    width: 85vw;
    max-width: 320px;
    transform: translateX(-100%);
    box-shadow: none;
    transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s;
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 8px 0 40px rgba(0,0,0,.25);
  }

  /* Overlay behind open sidebar */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 99;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.show { display: block; }

  /* ── Main area ── */
  .main { margin-left: 0; }
  .lesson-progress { left: 0; top: 56px; }

  /* ── Topbar ── */
  .topbar {
    padding: 0 16px;
    height: 56px;
    gap: 8px;
  }
  .topbar-breadcrumb {
    font-size: .75rem;
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: calc(100vw - 160px);
  }
  /* Hide middle breadcrumb items on tiny screens */
  .topbar-breadcrumb span:not(:last-of-type) { display: none; }
  .topbar-breadcrumb > *:not(:last-child) { display: none; }
  .topbar-breadcrumb strong { display: block; }

  .btn-complete {
    padding: 7px 12px;
    font-size: .78rem;
    white-space: nowrap;
  }

  /* ── Sidebar toggle (hamburger) ── */
  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    font-size: 1.1rem;
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
  }

  /* ── Lesson & Home views ── */
  .lesson-view { padding: 24px 16px 100px; }
  .home-view   { padding: 28px 16px 100px; }

  /* ── Lesson header ── */
  .lesson-header-area { margin-bottom: 32px; }
  .lh-title { font-size: clamp(1.6rem, 7vw, 2.2rem); letter-spacing: -.5px; }

  /* ── Section headings ── */
  .content-section { margin-bottom: 36px; }
  .content-section h2 { font-size: 1.35rem; }
  .content-section h3 { font-size: 1rem; }
  .content-section p, .content-section li { font-size: .95rem; }

  /* ── Callout boxes ── */
  .callout { padding: 14px 16px; gap: 12px; }
  .callout-icon { font-size: 1.2rem; }
  .callout-body p { font-size: .88rem; }

  /* ── Code blocks ── */
  .code-block { border-radius: 10px; margin: 16px -4px; }
  .code-header { padding: 10px 14px; }
  .code-lang { display: none; } /* hide lang label on small screens */
  pre { padding: 16px; font-size: .8rem; }
  code { font-size: .8rem; line-height: 1.7; }
  .code-annotation { padding: 0 14px 14px; }
  .ann-line { font-size: .78rem; }

  /* ── Steps ── */
  .steps::before { left: 15px; top: 36px; }
  .step { gap: 14px; padding: 12px 0; }
  .step-num { width: 32px; height: 32px; font-size: .78rem; }
  .step-body { padding-top: 4px; }
  .step-title { font-size: .95rem; }
  .step-desc { font-size: .86rem; }

  /* ── Comparison table — scroll horizontally ── */
  .compare-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 16px -4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .compare-table {
    min-width: 520px;
    border: none;
    border-radius: 0;
    margin: 0;
    font-size: .82rem;
  }
  .compare-table th { padding: 10px 14px; font-size: .72rem; }
  .compare-table td { padding: 10px 14px; }

  /* ── Quiz ── */
  .quiz-section { padding: 20px 16px; border-radius: 12px; }
  .quiz-title { font-size: 1.1rem; }
  .quiz-question { padding: 16px; border-radius: 10px; }
  .quiz-q-text { font-size: .92rem; }
  .quiz-opt { padding: 10px 14px; font-size: .88rem; }

  /* ── Exercise ── */
  .exercise-box { padding: 20px 16px; border-radius: 12px; }
  .exercise-title { font-size: 1.05rem; }
  .exercise-tasks li { font-size: .88rem; }

  /* ── Diagram boxes ── */
  .diagram { padding: 18px 12px; }
  .box-diagram { gap: 6px; }
  .dbox { padding: 8px 10px; font-size: .78rem; min-width: 70px; }
  .darrow { font-size: 1rem; }

  /* ── Home ── */
  .home-hero { margin-bottom: 36px; }
  .home-title { letter-spacing: -1px; }
  .home-desc { font-size: 1rem; }
  .home-promise { grid-template-columns: 1fr; gap: 10px; margin-bottom: 32px; }
  .promise-card { padding: 18px; }

  /* ── Module overview cards ── */
  .module-overview-card {
    padding: 16px;
    gap: 14px;
    border-radius: 12px;
  }
  .module-overview-card:hover { transform: none; box-shadow: none; }
  .moc-icon { width: 44px; height: 44px; font-size: 1.3rem; border-radius: 10px; }
  .moc-title { font-size: .95rem; }
  .moc-desc  { font-size: .8rem; }
  .moc-bar-wrap { width: 60px; }

  /* ── Lesson nav arrows ── */
  .lesson-nav { gap: 10px; padding: 24px 0; }
  .nav-arrow { padding: 10px 14px; font-size: .82rem; }

  /* ── Nav lesson buttons ── */
  .nav-lesson-btn { font-size: .8rem; }
  .nav-module-btn { font-size: .88rem; padding: 10px 18px; }
}

/* ══════════════════════════════════════════
   RESPONSIVE — SMALL PHONES (≤ 380px)

@media (max-width: 380px) {

/* ══════════════════════════════════════════
   MINI PROJECT & CAPSTONE CARDS
══════════════════════════════════════════ */

/* Lesson type badges */
.lh-badge-mini    { background: rgba(196,125,14,.12); color: #c47d0e; }
.lh-badge-capstone{ background: rgba(232,57,14,.12);  color: #e8390e; }

/* Project hero banner */
.project-banner {
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 36px;
  position: relative;
  overflow: hidden;
}
.project-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: .07;
  background: repeating-linear-gradient(
    45deg, #fff 0, #fff 1px, transparent 0, transparent 50%
  );
  background-size: 12px 12px;
}
.project-banner.mini     { background: linear-gradient(135deg, #7c3200, #c47d0e); }
.project-banner.capstone { background: linear-gradient(135deg, #0a0a0f, #e8390e 180%); }

.pb-eyebrow {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin-bottom: 10px;
}
.pb-title {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 12px;
}
.pb-desc {
  font-size: .95rem;
  color: rgba(255,255,255,.75);
  line-height: 1.7;
  max-width: 580px;
}
.pb-meta {
  display: flex;
  gap: 16px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.pb-pill {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 999px;
  padding: 5px 14px;
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: 1px;
  color: #fff;
}

/* Tech stack chips */
.tech-stack {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0 24px;
}
.tech-chip {
  background: var(--paper3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: .76rem;
  font-weight: 500;
  color: var(--ink);
}

/* Feature list */
.feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}
.feature-item {
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.feature-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.feature-body { }
.feature-title { font-weight: 700; font-size: .88rem; margin-bottom: 3px; }
.feature-desc  { font-size: .8rem; color: var(--muted); line-height: 1.5; }

/* Steps numbered for project */
.project-steps {
  counter-reset: pstep;
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 20px 0;
}
.project-step {
  background: var(--paper);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 20px 20px 20px 68px;
  position: relative;
}
.project-step::before {
  counter-increment: pstep;
  content: counter(pstep);
  position: absolute;
  left: 18px;
  top: 18px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  font-family: var(--mono);
  font-size: .82rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ps-title { font-weight: 700; font-size: .95rem; margin-bottom: 6px; color: var(--ink); }
.ps-desc  { font-size: .88rem; color: var(--muted); line-height: 1.65; }
.ps-code  { margin-top: 12px; }

  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 16px 0;
}
.project-checklist li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: .9rem;
  line-height: 1.5;
  cursor: pointer;
  transition: border-color .15s;

.project-checklist li:hover { border-color: var(--accent2); }
.project-checklist li.done-item {
  border-color: var(--accent2);
  background: #edf7f1;
  text-decoration: line-through;
  color: var(--muted);
}
.pcheck {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem;
  flex-shrink: 0;
  transition: all .15s;
  margin-top: 1px;
}
.done-item .pcheck { background: var(--accent2); border-color: var(--accent2); color: #fff; }

/* Preview mockup box */
.preview-box {
  background: #1a1814;
  border-radius: 14px;
  overflow: hidden;
  margin: 20px 0;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.preview-bar {
  background: #2a2520;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.preview-dots { display: flex; gap: 5px; }
.preview-dots span { width: 10px; height: 10px; border-radius: 50%; }
.preview-dots .p1{background:#ff5f57;} .preview-dots .p2{background:#ffbd2e;} .preview-dots .p3{background:#28ca41;}
.preview-url {
  flex: 1;
  background: rgba(255,255,255,.06);
  border-radius: 6px;
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: .72rem;
  color: rgba(255,255,255,.4);
}
.preview-content {
  padding: 24px;
  min-height: 120px;
}

/* Capstone milestone tracker */
.milestones {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin: 24px 0;
  position: relative;
}
.milestones::before {
  content: '';
  position: absolute;
  left: 20px; top: 40px; bottom: 20px;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  opacity: .3;
}
.milestone {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 14px 0;
}
.ms-dot {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  border: 2px solid var(--border);
  background: var(--paper);
}
.milestone.done-ms .ms-dot { background: var(--accent2); border-color: var(--accent2); }
.ms-body { padding-top: 8px; }
.ms-title { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
.ms-desc  { font-size: .85rem; color: var(--muted); line-height: 1.6; }
.ms-badge {
  display: inline-block;
  background: var(--paper3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
  margin-top: 6px;
}

@media (max-width: 768px) {
  .feature-grid { grid-template-columns: 1fr; }
  .project-banner { padding: 22px 18px; }
  .pb-title { font-size: 1.4rem; }
  .project-step { padding: 16px 16px 16px 58px; }
}

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(232,57,14,.1);color:#e8390e;">Module 1 · HTML5</span>
  <h1 class="lh-title">C'est quoi le Web, vraiment ?</h1>
  <p class="lh-intro">Avant d'écrire une seule ligne de code, tu dois comprendre comment Internet fonctionne. Cette leçon te donne le "déclic" que personne n'explique aux débutants.</p>
  <div class="lh-meta">
    <span>⏱ 15 min</span>
    <span>📖 Fondamentaux</span>
    <span>🎯 Débutant absolu</span>
  </div>
</div>

<div class="content-section">
  <h2>🏗️ Le Web, c'est comme une ville</h2>

  <p>Imagine que tu veux visiter le musée du Louvre. Tu as besoin de plusieurs choses : une <strong>adresse</strong> (pour savoir où aller), une <strong>route</strong> (pour t'y rendre), et le <strong>bâtiment lui-même</strong> (ce que tu viens voir). Le Web fonctionne exactement pareil.</p>

  <div class="callout analogy">
    <div class="callout-icon">🏛️</div>
    <div class="callout-body">
      <strong>L'analogie parfaite</strong>
      <p>Quand tu tapes <code>www.google.com</code> dans ton navigateur :</p>
      <p>→ <strong>L'adresse URL</strong> = l'adresse postale du musée<br>
      → <strong>Internet</strong> = les routes et autoroutes<br>
      → <strong>Le serveur</strong> = le bâtiment du musée<br>
      → <strong>Le navigateur (Chrome, Firefox)</strong> = toi, le visiteur<br>
      → <strong>Le fichier HTML renvoyé</strong> = le contenu du musée</p>
    </div>
  </div>

  <h3>Ce qui se passe en coulisses quand tu visites un site</h3>
  <p>Voici le voyage exact que fait ta requête en moins d'une seconde :</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">Tu tapes l'URL</div>
        <div class="step-desc">Ton navigateur lit l'adresse. Exemple : <code>https://www.monsite.com/about</code>. Il doit d'abord <strong>traduire</strong> ce nom en adresse IP (un numéro comme 142.250.74.14) grâce à un système appelé <strong>DNS</strong> (Domain Name System). C'est comme un annuaire téléphonique géant qui traduit les noms en numéros.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">La connexion est établie</div>
        <div class="step-desc">Ton navigateur contacte le serveur à cette adresse IP et dit "Bonjour ! Je voudrais la page /about". Ce dialogue suit un protocole strict appelé <strong>HTTP</strong> (ou HTTPS pour la version sécurisée). C'est le langage commun entre ton navigateur et tous les serveurs du monde.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">Le serveur répond</div>
        <div class="step-desc">Le serveur cherche la page demandée et répond avec un <strong>code de statut</strong> (200 = succès, 404 = page introuvable, 500 = erreur serveur) et le <strong>contenu de la page</strong> (fichiers HTML, CSS, JavaScript, images…).</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-body">
        <div class="step-title">Le navigateur construit la page</div>
        <div class="step-desc">Ton navigateur reçoit les fichiers et les "interprète" pour afficher ce que tu vois à l'écran. C'est ici que HTML, CSS et JavaScript entrent en jeu — et c'est exactement ce que tu vas apprendre.</div>
      </div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🧱 Les 3 langages du Web</h2>

  <p>Un site web est toujours construit avec 3 technologies qui ont chacune un rôle précis et distinct. Pense à une maison :</p>

  <div class="diagram">
    <div class="diagram-title">Les 3 couches d'un site web</div>
    <div class="box-diagram">
      <div class="dbox" style="border-color:#e8390e;color:#e8390e;background:rgba(232,57,14,.06);">
        <div style="font-size:1.4rem;margin-bottom:6px;">🏗️</div>
        <div>HTML</div>
        <div style="font-size:.75rem;font-weight:400;margin-top:4px;color:#7a6f5e;">La structure<br>(les murs)</div>
      </div>
      <div class="darrow">+</div>
      <div class="dbox" style="border-color:#1d4ed8;color:#1d4ed8;background:rgba(29,78,216,.06);">
        <div style="font-size:1.4rem;margin-bottom:6px;">🎨</div>
        <div>CSS</div>
        <div style="font-size:.75rem;font-weight:400;margin-top:4px;color:#7a6f5e;">Le design<br>(la peinture)</div>
      </div>
      <div class="darrow">+</div>
      <div class="dbox" style="border-color:#c47d0e;color:#c47d0e;background:rgba(196,125,14,.06);">
        <div style="font-size:1.4rem;margin-bottom:6px;">⚙️</div>
        <div>JavaScript</div>
        <div style="font-size:.75rem;font-weight:400;margin-top:4px;color:#7a6f5e;">L'interactivité<br>(l'électricité)</div>
      </div>
      <div class="darrow">=</div>
      <div class="dbox" style="border-color:#1a6b3a;color:#1a6b3a;background:rgba(26,107,58,.06);">
        <div style="font-size:1.4rem;margin-bottom:6px;">✨</div>
        <div>Site Web</div>
        <div style="font-size:.75rem;font-weight:400;margin-top:4px;color:#7a6f5e;">Complet<br>et vivant</div>
      </div>
    </div>
  </div>

  <table class="compare-table">
    <thead>
      <tr><th>Langage</th><th>Rôle</th><th>Exemple concret</th><th>Sans lui…</th></tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>HTML</strong></td>
        <td>Structure et contenu</td>
        <td>"Voici un titre, voici un paragraphe, voici une image"</td>
        <td>Il n'y a rien à afficher</td>
      </tr>
      <tr>
        <td><strong>CSS</strong></td>
        <td>Apparence visuelle</td>
        <td>"Ce titre est rouge, cette image a des bords arrondis"</td>
        <td>Tout est gris et sans mise en forme</td>
      </tr>
      <tr>
        <td><strong>JavaScript</strong></td>
        <td>Comportement dynamique</td>
        <td>"Quand je clique sur ce bouton, un menu apparaît"</td>
        <td>La page est figée et morte</td>
      </tr>
    </tbody>
  </table>

  <div class="callout tip">
    <div class="callout-icon">💡</div>
    <div class="callout-body">
      <strong>L'ordre d'apprentissage est crucial</strong>
      <p>On commence TOUJOURS par HTML → CSS → JavaScript. C'est l'ordre logique : tu ne peux pas peindre (CSS) des murs qui n'existent pas encore (HTML). Et tu ne peux pas rendre interactifs (JS) des éléments sans structure ni style.</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🛠️ Ton environnement de travail</h2>
  <p>Pour coder, tu as besoin de 2 outils, et c'est tout :</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">Un éditeur de code : VS Code</div>
        <div class="step-desc">Télécharge <strong>Visual Studio Code</strong> gratuitement sur code.visualstudio.com. C'est l'éditeur utilisé par 70% des développeurs web dans le monde. Il colore ton code (syntaxe highlighting), t'aide à compléter tes phrases (autocompletion) et détecte tes erreurs en temps réel.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">Un navigateur moderne : Chrome ou Firefox</div>
        <div class="step-desc">Tu en as déjà un. La fonctionnalité clé : les <strong>DevTools</strong> (outils de développement). Fais <code>F12</code> sur n'importe quelle page web pour les ouvrir. Tu peux voir le code HTML, modifier le CSS en direct, débugger du JavaScript — un outil indispensable pour tout développeur.</div>
      </div>
    </div>
  </div>

  <div class="callout warning">
    <div class="callout-icon">⚠️</div>
    <div class="callout-body">
      <strong>Erreur classique du débutant</strong>
      <p>N'utilise PAS Word, Notepad ou Google Docs pour coder. Ce sont des éditeurs de texte "riche" qui ajoutent des formats invisibles qui cassent ton code. Utilise uniquement VS Code ou un éditeur de code dédié.</p>
    </div>
  </div>
</div>

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(232,57,14,.1);color:#e8390e;">Module 1 · HTML5</span>
  <h1 class="lh-title">HTML : Structure, balises et anatomie</h1>
  <p class="lh-intro">HTML est le squelette de chaque page web. Comprendre sa logique en profondeur, c'est avoir des fondations solides pour tout le reste de ta carrière.</p>
  <div class="lh-meta"><span>⏱ 30 min</span><span>📖 HTML</span><span>🎯 Débutant</span></div>
</div>

<div class="content-section">
  <h2>🔤 Qu'est-ce qu'une balise HTML ?</h2>

  <p>HTML signifie <strong>HyperText Markup Language</strong>. Le mot clé ici est <strong>"Markup"</strong> — en français, "balisage". HTML ne calcule rien, n'a pas de logique : il dit juste au navigateur <em>"ceci est un titre, ceci est un paragraphe, ceci est une image"</em>.</p>

  <div class="callout analogy">
    <div class="callout-icon">📦</div>
    <div class="callout-body">
      <strong>Les balises = des boîtes avec des étiquettes</strong>
      <p>Imagine que tu ranges des affaires dans des boîtes. Tu mets une étiquette sur chaque boîte pour dire ce qu'elle contient : "LIVRES", "VÊTEMENTS", "CUISINE". HTML fait pareil : tu "emballes" ton contenu dans des balises qui disent ce que c'est.</p>
      <p><code>&lt;h1&gt;Mon titre&lt;/h1&gt;</code> = boîte étiquetée "TITRE PRINCIPAL" avec "Mon titre" à l'intérieur.</p>
    </div>
  </div>

  <h3>Anatomie d'une balise HTML</h3>
  <p>Chaque balise a une structure précise. Décortiquons-la ensemble :</p>

  <div class="code-block">
    <div class="code-header">
      <div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div>
      <div class="code-filename">anatomie.html</div>
      <div class="code-lang">HTML</div>
    </div>
    <pre><code><span class="tag">&lt;p</span> <span class="attr">class</span>=<span class="val">"introduction"</span><span class="tag">&gt;</span>
  Voici mon premier paragraphe !
<span class="tag">&lt;/p&gt;</span></code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">①</div><div class="ann-text"><code>&lt;p</code> → La "balise ouvrante". Le <code>p</code> est le nom de la balise (ici : paragraphe). Toujours entouré de chevrons <code>&lt; &gt;</code>.</div></div>
      <div class="ann-line"><div class="ann-num">②</div><div class="ann-text"><code>class="introduction"</code> → Un "attribut". Il donne des informations supplémentaires à la balise. Format : <code>nom="valeur"</code>. Il y en a des dizaines différents.</div></div>
      <div class="ann-line"><div class="ann-num">③</div><div class="ann-text">Le contenu entre les balises → ce que le visiteur verra réellement dans son navigateur.</div></div>
      <div class="ann-line"><div class="ann-num">④</div><div class="ann-text"><code>&lt;/p&gt;</code> → La "balise fermante". IDENTIQUE à la balise ouvrante mais avec un <code>/</code> avant le nom. Elle ferme la "boîte".</div></div>
    </div>
  </div>

  <div class="callout warning">
    <div class="callout-icon">⚠️</div>
    <div class="callout-body">
      <strong>L'erreur n°1 de tout débutant</strong>
      <p>Oublier de fermer ses balises. Si tu ouvres <code>&lt;p&gt;</code>, tu DOIS fermer avec <code>&lt;/p&gt;</code>. Certaines balises sont "auto-fermantes" (elles n'ont pas de contenu), comme <code>&lt;img /&gt;</code>, <code>&lt;br /&gt;</code>, <code>&lt;input /&gt;</code>. Mais pour les autres : toujours fermer.</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>📄 La structure minimale d'une page HTML</h2>
  <p>Toute page HTML valide doit avoir exactement cette structure. Pas question de l'inventer — c'est un standard international.</p>

  <div class="code-block">
    <div class="code-header">
      <div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div>
      <div class="code-filename">index.html</div>
      <div class="code-lang">HTML</div>
    </div>
    <pre><code><span class="tag">&lt;!DOCTYPE html&gt;</span>
<span class="tag">&lt;html</span> <span class="attr">lang</span>=<span class="val">"fr"</span><span class="tag">&gt;</span>

  <span class="tag">&lt;head&gt;</span>
    <span class="tag">&lt;meta</span> <span class="attr">charset</span>=<span class="val">"UTF-8"</span><span class="tag">&gt;</span>
    <span class="tag">&lt;meta</span> <span class="attr">name</span>=<span class="val">"viewport"</span> <span class="attr">content</span>=<span class="val">"width=device-width, initial-scale=1.0"</span><span class="tag">&gt;</span>
    <span class="tag">&lt;title&gt;</span>Ma première page web<span class="tag">&lt;/title&gt;</span>
  <span class="tag">&lt;/head&gt;</span>

  <span class="tag">&lt;body&gt;</span>
    <span class="tag">&lt;h1&gt;</span>Bienvenue sur mon site !<span class="tag">&lt;/h1&gt;</span>
    <span class="tag">&lt;p&gt;</span>Voici mon premier paragraphe.<span class="tag">&lt;/p&gt;</span>
  <span class="tag">&lt;/body&gt;</span>

<span class="tag">&lt;/html&gt;</span></code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">①</div><div class="ann-text"><code>&lt;!DOCTYPE html&gt;</code> → Pas vraiment une balise. C'est une déclaration qui dit au navigateur : "Ce fichier est du HTML5 (la version moderne)." Elle doit être ABSOLUMENT en première ligne.</div></div>
      <div class="ann-line"><div class="ann-num">②</div><div class="ann-text"><code>&lt;html lang="fr"&gt;</code> → La balise racine. Elle englobe tout. L'attribut <code>lang="fr"</code> dit aux moteurs de recherche et aux lecteurs d'écran que la page est en français.</div></div>
      <div class="ann-line"><div class="ann-num">③</div><div class="ann-text"><code>&lt;head&gt;</code> → La "coulisse" de la page. Ce qui est ici n'est PAS visible par l'utilisateur, mais c'est crucial : métadonnées, liens vers CSS, titre de l'onglet, SEO…</div></div>
      <div class="ann-line"><div class="ann-num">④</div><div class="ann-text"><code>&lt;meta charset="UTF-8"&gt;</code> → Définit l'encodage des caractères. UTF-8 supporte tous les caractères de toutes les langues (accents français, arabe, chinois…). TOUJOURS l'inclure.</div></div>
      <div class="ann-line"><div class="ann-num">⑤</div><div class="ann-text"><code>viewport</code> → Indispensable pour le design responsive (mobile). Sans ça, ton site sera tout petit sur téléphone.</div></div>
      <div class="ann-line"><div class="ann-num">⑥</div><div class="ann-text"><code>&lt;body&gt;</code> → Tout ce qui est ICI s'affiche dans le navigateur. C'est là que tu mets ton vrai contenu.</div></div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>📚 Les balises essentielles à maîtriser</h2>

  <h3>Titres (h1 à h6)</h3>
  <p>Les titres créent une hiérarchie dans ta page. C'est comme les chapitres et sous-chapitres d'un livre. <strong>Règle absolue : une seule balise <code>&lt;h1&gt;</code> par page</strong> (c'est le titre principal — les moteurs de recherche s'en servent pour comprendre de quoi parle ta page).</p>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">HTML</div></div>
    <pre><code><span class="tag">&lt;h1&gt;</span>Titre principal (unique sur la page)<span class="tag">&lt;/h1&gt;</span>
<span class="tag">&lt;h2&gt;</span>Sous-titre de section<span class="tag">&lt;/h2&gt;</span>
<span class="tag">&lt;h3&gt;</span>Sous-sous-titre<span class="tag">&lt;/h3&gt;</span>
<span class="tag">&lt;h4&gt;</span>Niveau 4 (moins courant)<span class="tag">&lt;/h4&gt;</span>
<span class="tag">&lt;h5&gt;</span>Niveau 5<span class="tag">&lt;/h5&gt;</span>
<span class="tag">&lt;h6&gt;</span>Niveau 6 (très rarement utilisé)<span class="tag">&lt;/h6&gt;</span></code></pre>
  </div>

  <h3>Texte et formatage</h3>
  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">HTML</div></div>
    <pre><code><span class="cm">&lt;!-- Paragraphe — unité de texte de base --&gt;</span>
<span class="tag">&lt;p&gt;</span>Je suis un paragraphe de texte normal.<span class="tag">&lt;/p&gt;</span>

<span class="cm">&lt;!-- Mise en valeur --&gt;</span>
<span class="tag">&lt;strong&gt;</span>Texte important (gras sémantique)<span class="tag">&lt;/strong&gt;</span>
<span class="tag">&lt;em&gt;</span>Texte mis en emphase (italique)<span class="tag">&lt;/em&gt;</span>

<span class="cm">&lt;!-- Lien — la base du Web hypertexte ! --&gt;</span>
<span class="tag">&lt;a</span> <span class="attr">href</span>=<span class="val">"https://google.com"</span> <span class="attr">target</span>=<span class="val">"_blank"</span><span class="tag">&gt;</span>
  Visiter Google (dans un nouvel onglet)
<span class="tag">&lt;/a&gt;</span>

<span class="cm">&lt;!-- Lien interne vers une autre page --&gt;</span>
<span class="tag">&lt;a</span> <span class="attr">href</span>=<span class="val">"./contact.html"</span><span class="tag">&gt;</span>Page de contact<span class="tag">&lt;/a&gt;</span>

<span class="cm">&lt;!-- Retour à la ligne forcé --&gt;</span>
<span class="tag">&lt;br&gt;</span>

<span class="cm">&lt;!-- Ligne horizontale de séparation --&gt;</span>
<span class="tag">&lt;hr&gt;</span></code></pre>
  </div>

  <h3>Listes</h3>
  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">HTML</div></div>
    <pre><code><span class="cm">&lt;!-- Liste NON ordonnée (puces) --&gt;</span>
<span class="tag">&lt;ul&gt;</span>
  <span class="tag">&lt;li&gt;</span>HTML — la structure<span class="tag">&lt;/li&gt;</span>

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(232,57,14,.1);color:#e8390e;">Module 1 · CSS</span>
  <h1 class="lh-title">CSS : Sélecteurs, propriétés et le modèle en boîte</h1>
  <p class="lh-intro">Le CSS transforme un document brut en œuvre visuelle. Comprendre le "Box Model" est le moment où tout devient logique — et où tu arrêtes de lutter contre le navigateur.</p>
  <div class="lh-meta"><span>⏱ 40 min</span><span>📖 CSS3</span><span>🎯 Débutant</span></div>
</div>

<div class="content-section">
  <h2>🎨 Comment CSS fonctionne-t-il ?</h2>

  <p>CSS signifie <strong>Cascading Style Sheets</strong>. "Cascading" (cascade) est le mot-clé : les styles "coulent" depuis le haut vers le bas, et les règles plus spécifiques écrasent les règles plus générales. C'est l'un des concepts les plus importants (et les plus mal compris) de CSS.</p>

  <h3>Les 3 façons d'intégrer du CSS</h3>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">HTML</div></div>
    <pre><code><span class="cm">&lt;!-- MÉTHODE 1 : Fichier externe (RECOMMANDÉE) --&gt;</span>
<span class="cm">&lt;!-- Dans &lt;head&gt; de ton HTML : --&gt;</span>
<span class="tag">&lt;link</span> <span class="attr">rel</span>=<span class="val">"stylesheet"</span> <span class="attr">href</span>=<span class="val">"./style.css"</span><span class="tag">&gt;</span>

<span class="cm">&lt;!-- MÉTHODE 2 : Balise &lt;style&gt; dans &lt;head&gt; (pour tester) --&gt;</span>
<span class="tag">&lt;style&gt;</span>
  <span class="sel">h1</span> { <span class="prop">color</span>: <span class="val">red</span>; }
<span class="tag">&lt;/style&gt;</span>

<span class="cm">&lt;!-- MÉTHODE 3 : Inline (À ÉVITER — cauchemar à maintenir) --&gt;</span>
<span class="tag">&lt;h1</span> <span class="attr">style</span>=<span class="val">"color: red; font-size: 24px;"</span><span class="tag">&gt;</span>Titre<span class="tag">&lt;/h1&gt;</span></code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">✓</div><div class="ann-text">Méthode 1 : UN seul fichier CSS pour tout le site. Si tu changes la couleur principale, tu le fais UNE fois. Ton HTML reste propre et lisible.</div></div>
      <div class="ann-line"><div class="ann-num">✗</div><div class="ann-text">Méthode 3 : Si tu as 100 titres rouges et tu veux les passer en bleu → 100 modifications. Impossible à maintenir sur un vrai projet.</div></div>
    </div>
  </div>

  <h3>Syntaxe d'une règle CSS</h3>
  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">style.css</div><div class="code-lang">CSS</div></div>
    <pre><code><span class="sel">h1</span> {
  <span class="prop">color</span>: <span class="val">navy</span>;
  <span class="prop">font-size</span>: <span class="val">2rem</span>;
  <span class="prop">font-weight</span>: <span class="val">800</span>;
  <span class="prop">margin-bottom</span>: <span class="val">20px</span>;
}</code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">①</div><div class="ann-text"><code>h1</code> → Le SÉLECTEUR. Il cible les éléments HTML auxquels s'appliquent les styles. Ici : tous les éléments <code>&lt;h1&gt;</code> de la page.</div></div>
      <div class="ann-line"><div class="ann-num">②</div><div class="ann-text"><code>{ … }</code> → Les accolades délimitent le BLOC de déclarations. Tout ce qui est entre ces accolades s'applique aux éléments ciblés.</div></div>
      <div class="ann-line"><div class="ann-num">③</div><div class="ann-text"><code>color: navy;</code> → Une DÉCLARATION. Format : <code>propriété: valeur;</code>. Le point-virgule à la fin est OBLIGATOIRE (sauf pour la dernière, mais mets-le quand même par habitude).</div></div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🎯 Les Sélecteurs CSS — cibler précisément</h2>

  <p>Les sélecteurs sont le cœur de CSS. Ils te permettent de dire "applique ce style à CET élément précis, pas aux autres".</p>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">CSS — Du plus général au plus précis</div></div>
    <pre><code><span class="cm">/* Sélecteur de balise — cible TOUS les &lt;p&gt; */</span>
<span class="sel">p</span> { <span class="prop">color</span>: <span class="val">#333</span>; }

<span class="cm">/* Sélecteur de CLASSE — cible les éléments avec class="card" */</span>
<span class="cm">/* Le point . est le préfixe des classes */</span>
<span class="sel">.card</span> { <span class="prop">border</span>: <span class="val">1px solid #ccc</span>; <span class="prop">padding</span>: <span class="val">20px</span>; }

<span class="cm">/* Sélecteur d'ID — cible UN élément unique avec id="header" */</span>
<span class="cm">/* Le dièse # est le préfixe des IDs */</span>
<span class="sel">#header</span> { <span class="prop">background</span>: <span class="val">black</span>; }

<span class="cm">/* Combinaison : .card qui contient un h2 */</span>
<span class="sel">.card h2</span> { <span class="prop">font-size</span>: <span class="val">1.2rem</span>; }

<span class="cm">/* PSEUDO-CLASSES : états de l'élément */</span>
<span class="sel">a:hover</span>  { <span class="prop">color</span>: <span class="val">red</span>; }        <span class="cm">/* au survol */</span>
<span class="sel">a:visited</span>{ <span class="prop">color</span>: <span class="val">purple</span>; }     <span class="cm">/* déjà visité */</span>
<span class="sel">input:focus</span> { <span class="prop">outline</span>: <span class="val">2px solid blue</span>; }  <span class="cm">/* en focus */</span>
<span class="sel">li:nth-child(2)</span> { <span class="prop">color</span>: <span class="val">red</span>; }  <span class="cm">/* 2ème enfant */</span>

<span class="cm">/* Sélecteur universel (tout cibler) */</span>
<span class="sel">*</span> { <span class="prop">box-sizing</span>: <span class="val">border-box</span>; }</code></pre>
  </div>

  <div class="callout tip">
    <div class="callout-icon">💡</div>
    <div class="callout-body">
      <strong>Classe vs ID : la règle d'or</strong>
      <p>Utilise les <strong>classes</strong> (<code>.nom</code>) pour styliser. Elles sont réutilisables sur plusieurs éléments. Utilise les <strong>IDs</strong> (<code>#nom</code>) uniquement pour les ancres dans la page ou pour JavaScript. En CSS, préfère toujours les classes. Un ID par page maximum pour le même nom.</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>📦 Le Box Model — la clé de tout</h2>

  <p>C'est LE concept que tu dois absolument maîtriser. <strong>En CSS, CHAQUE élément HTML est une boîte</strong>. Cette boîte a 4 couches, de l'intérieur vers l'extérieur :</p>

  <div class="diagram">
    <div class="diagram-title">Le modèle en boîte (Box Model)</div>
    <div style="max-width:400px;margin:0 auto;">
      <div style="border:3px dashed #e8390e;padding:16px;border-radius:8px;background:rgba(232,57,14,.04);">
        <div style="text-align:left;font-family:var(--mono);font-size:.75rem;color:#e8390e;margin-bottom:8px;">MARGIN (espace extérieur)</div>
        <div style="border:3px solid #c47d0e;padding:16px;border-radius:6px;background:rgba(196,125,14,.06);">
          <div style="text-align:left;font-family:var(--mono);font-size:.75rem;color:#c47d0e;margin-bottom:8px;">BORDER (le bord)</div>
          <div style="border:3px solid #1a6b3a;padding:16px;border-radius:4px;background:rgba(26,107,58,.06);">
            <div style="text-align:left;font-family:var(--mono);font-size:.75rem;color:#1a6b3a;margin-bottom:8px;">PADDING (espace intérieur)</div>
            <div style="background:#1d4ed8;color:white;padding:16px;border-radius:4px;text-align:center;font-weight:700;font-size:.9rem;">CONTENT<br><span style="font-size:.75rem;font-weight:400;opacity:.8;">largeur × hauteur</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">CSS — Box Model en pratique</div></div>
    <pre><code>.<span class="cls">ma-carte</span> {
  <span class="cm">/* CONTENT — le contenu */</span>
  <span class="prop">width</span>: <span class="val">300px</span>;
  <span class="prop">height</span>: <span class="val">auto</span>;     <span class="cm">/* auto = adapté au contenu */</span>

  <span class="cm">/* PADDING — espace ENTRE le contenu et la bordure */</span>
  <span class="prop">padding</span>: <span class="val">20px</span>;          <span class="cm">/* 20px partout */</span>
  <span class="prop">padding</span>: <span class="val">10px 20px</span>;     <span class="cm">/* haut/bas   gauche/droite */</span>
  <span class="prop">padding</span>: <span class="val">10px 20px 15px 5px</span>; <span class="cm">/* haut droite bas gauche */</span>

  <span class="cm">/* BORDER — la bordure elle-même */</span>
  <span class="prop">border</span>: <span class="val">2px solid #333</span>; <span class="cm">/* épaisseur type couleur */</span>
  <span class="prop">border-radius</span>: <span class="val">8px</span>;    <span class="cm">/* coins arrondis */</span>

  <span class="cm">/* MARGIN — espace ENTRE la carte et les autres éléments */</span>
  <span class="prop">margin</span>: <span class="val">20px auto</span>; <span class="cm">/* centrage horizontal (auto) */</span>

  <span class="cm">/* IMPORTANT : évite les surprises de calcul */</span>
  <span class="prop">box-sizing</span>: <span class="val">border-box</span>; <span class="cm">/* width inclut padding+border */</span>
}</code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">!</div><div class="ann-text"><strong>box-sizing: border-box</strong> — Par défaut, <code>width: 300px</code> + <code>padding: 20px</code> = 340px de large réel. Avec <code>border-box</code>, les 300px INCLUENT le padding. Mets toujours <code>* { box-sizing: border-box; }</code> en début de CSS.</div></div>
    </div>
  </div>

  <div class="callout analogy">
    <div class="callout-icon">🎁</div>
    <div class="callout-body">
      <strong>L'analogie du colis postal</strong>
      <p><strong>Content</strong> = Le produit dans la boîte<br>
      <strong>Padding</strong> = Le papier bulle autour du produit<br>
      <strong>Border</strong> = La boîte en carton elle-même<br>
      <strong>Margin</strong> = L'espace entre les colis sur l'étagère du dépôt</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🎨 Couleurs, typographie et unités</h2>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">CSS</div></div>
    <pre><code><span class="cm">/* ── COULEURS ── */</span>

<span class="cm">/* Nom de couleur (limité mais pratique pour tester) */</span>
<span class="prop">color</span>: <span class="val">red</span>;

<span class="cm">/* Hexadécimal — le plus courant */</span>
<span class="prop">color</span>: <span class="val">#e8390e</span>;   <span class="cm">/* 6 chiffres hex : #RRGGBB */</span>
<span class="prop">color</span>: <span class="val">#e83</span>;      <span class="cm">/* Raccourci 3 chiffres */</span>

<span class="cm">/* RGB / RGBA (A = transparence de 0 à 1) */</span>
<span class="prop">color</span>: <span class="val">rgb(232, 57, 14)</span>;
<span class="prop">background</span>: <span class="val">rgba(232, 57, 14, 0.1)</span>;  <span class="cm">/* 10% opaque */</span>

<span class="cm">/* HSL — le plus intuitif pour les humains */</span>
<span class="prop">color</span>: <span class="val">hsl(14, 83%, 48%)</span>; <span class="cm">/* teinte rotation saturation luminosité */</span>

<span class="cm">/* Variables CSS (Custom Properties) — très puissant ! */</span>
<span class="sel">:root</span> {
  <span class="prop">--couleur-primaire</span>: <span class="val">#e8390e</span>;
  <span class="prop">--couleur-fond</span>: <span class="val">#f5f0e8</span>;
}
<span class="sel">h1</span> { <span class="prop">color</span>: <span class="val">var(--couleur-primaire)</span>; }

<span class="cm">/* ── TYPOGRAPHIE ── */</span>
<span class="sel">body</span> {
  <span class="prop">font-family</span>: <span class="val">'Poppins', Arial, sans-serif</span>; <span class="cm">/* liste de fallback */</span>
  <span class="prop">font-size</span>: <span class="val">16px</span>;         <span class="cm">/* taille de base */</span>
  <span class="prop">font-weight</span>: <span class="val">400</span>;        <span class="cm">/* 100-900. 400=normal, 700=gras */</span>
  <span class="prop">line-height</span>: <span class="val">1.6</span>;        <span class="cm">/* hauteur de ligne (sans unité = relatif) */</span>
  <span class="prop">letter-spacing</span>: <span class="val">0.02em</span>;  <span class="cm">/* espacement entre lettres */</span>
  <span class="prop">text-align</span>: <span class="val">left</span>;        <span class="cm">/* left center right justify */</span>
}

<span class="cm">/* ── UNITÉS — lequel utiliser ? ── */</span>
<span class="cm">/* px  — pixels fixes. Précis mais pas responsive */</span>
<span class="cm">/* rem — relatif à la taille de &lt;html&gt; (16px par défaut) */</span>
<span class="cm">/*        1rem = 16px, 1.5rem = 24px. RECOMMANDÉ pour les tailles */</span>
<span class="cm">/* em  — relatif à l'élément PARENT. Plus compliqué à prévoir */</span>
<span class="cm">/* %   — relatif au parent. Idéal pour les largeurs */</span>
<span class="cm">/* vw/vh — relatif à la fenêtre du navigateur */</span>
<span class="cm">/*         1vw = 1% de la largeur de fenêtre */</span></code></pre>
  </div>
</div>

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(196,125,14,.1);color:#c47d0e;">Module 2 · JavaScript</span>
  <h1 class="lh-title">Penser comme un ordinateur</h1>
  <p class="lh-intro">Avant d'apprendre la syntaxe JavaScript, tu dois comprendre comment un programme "pense". Cette leçon te donne le mode de pensée d'un développeur — et ça change tout.</p>
  <div class="lh-meta"><span>⏱ 25 min</span><span>📖 Algorithmique</span><span>🎯 Débutant</span></div>
</div>

<div class="content-section">
  <h2>🧠 Un programme = des instructions dans l'ordre</h2>

  <p>Un programme informatique, c'est simplement une liste d'instructions que l'ordinateur exécute <strong>dans l'ordre, une par une, de haut en bas</strong>. L'ordinateur est très fort pour exécuter des millions d'instructions par seconde, mais il est complètement "stupide" : il fait exactement et UNIQUEMENT ce qu'on lui dit.</p>

  <div class="callout analogy">
    <div class="callout-icon">👨‍🍳</div>
    <div class="callout-body">
      <strong>Un programme = une recette de cuisine</strong>
      <p>Quand tu fais de la cuisine, tu suis une recette : "Faire bouillir 500ml d'eau", "Ajouter 200g de pâtes", "Cuire 10 minutes"...</p>
      <p>Un programme JavaScript, c'est pareil : <code>let eau = 500</code> (prépare l'eau), <code>chauffer(eau)</code> (exécute l'action). Si tu rates une étape ou que tu les fais dans le mauvais ordre — le plat est raté. Pareil pour le code.</p>
    </div>
  </div>

  <h3>Les 3 structures de base de TOUT programme</h3>
  <p>Peu importe le langage (Python, Java, C++, JavaScript), <strong>tout programme ne fait que 3 choses</strong> :</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">Séquence — Les instructions s'exécutent dans l'ordre</div>
        <div class="step-desc">Ligne 1 s'exécute, puis ligne 2, puis ligne 3… Les ordinateurs lisent de haut en bas, comme toi qui lis ce texte.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">Condition (if/else) — Le programme prend des décisions</div>
        <div class="step-desc">"SI l'utilisateur est connecté, affiche son profil. SINON, affiche la page de connexion." Le programme peut prendre des chemins différents selon les situations.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">Boucle (for/while) — Répéter sans se fatiguer</div>
        <div class="step-desc">"Pour chaque produit dans le panier, calcule son prix et ajoute-le au total." L'ordinateur peut répéter une action 1 000 fois sans jamais se tromper ni se plaindre.</div>
      </div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>📦 Variables — la mémoire du programme</h2>

  <p>Une variable, c'est une <strong>boîte avec un nom</strong> dans laquelle tu stockes une information. Tu peux relire cette information plus tard, la modifier, la calculer…</p>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">variables.js</div><div class="code-lang">JavaScript</div></div>
    <pre><code><span class="cm">// ── DÉCLARER une variable ──</span>
<span class="cm">// Format : mot-clé nomDeVariable = valeur ;</span>

<span class="kw">const</span> prenom = <span class="str">"Alice"</span>;    <span class="cm">// CONSTANTE — ne changera jamais</span>
<span class="kw">let</span> age = <span class="num">22</span>;              <span class="cm">// VARIABLE — peut changer</span>
<span class="kw">let</span> estConnecte = <span class="kw">false</span>;  <span class="cm">// Booléen (vrai/faux)</span>

<span class="cm">// ── UTILISER une variable ──</span>
console.<span class="fn">log</span>(prenom);       <span class="cm">// Affiche : Alice</span>
console.<span class="fn">log</span>(age + <span class="num">8</span>);      <span class="cm">// Affiche : 30</span>

<span class="cm">// ── MODIFIER une variable (let uniquement) ──</span>
age = <span class="num">23</span>;                   <span class="cm">// OK avec let</span>
<span class="cm">// prenom = "Bob";           ← ERREUR : const ne peut pas changer !</span>

<span class="cm">// ── TEMPLATE LITERAL : construire du texte ──</span>
<span class="kw">const</span> message = <span class="str">&#96;Bonjour, je m'appelle \$${prenom} et j'ai \$${age} ans.&#96;</span>;
console.<span class="fn">log</span>(message);
<span class="cm">// → "Bonjour, je m'appelle Alice et j'ai 23 ans."</span>

<span class="cm">// ── Les types de données ──</span>
<span class="kw">const</span> texte   = <span class="str">"Bonjour"</span>;         <span class="cm">// String (chaîne de caractères)</span>
<span class="kw">const</span> nombre  = <span class="num">42</span>;               <span class="cm">// Number (entier ou décimal)</span>
<span class="kw">const</span> decimal = <span class="num">3.14</span>;             <span class="cm">// Number aussi</span>
<span class="kw">const</span> vrai    = <span class="kw">true</span>;             <span class="cm">// Boolean</span>
<span class="kw">const</span> faux    = <span class="kw">false</span>;            <span class="cm">// Boolean</span>
<span class="kw">const</span> rien    = <span class="kw">null</span>;             <span class="cm">// Null : "volontairement vide"</span>
<span class="kw">let</span>   inconnu;                    <span class="cm">// undefined : "pas encore défini"</span></code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">!</div><div class="ann-text">Règle de nommage : utilise le <strong>camelCase</strong> (première lettre minuscule, puis majuscule à chaque nouveau mot). Exemples : <code>nomUtilisateur</code>, <code>prixTotal</code>, <code>estConnecte</code>. Jamais d'espaces, jamais d'accents, jamais de tirets dans un nom de variable JS.</div></div>
    </div>
  </div>

  <div class="callout warning">
    <div class="callout-icon">⚠️</div>
    <div class="callout-body">
      <strong>const vs let vs var — la règle moderne</strong>
      <p>En JavaScript moderne : utilise <code>const</code> par défaut. Si tu réalises que la valeur doit changer → passe à <code>let</code>. N'utilise JAMAIS <code>var</code> (c'est l'ancienne façon, qui cause des bugs subtils). Si tu vois <code>var</code> dans un vieux tutoriel, ignore-le et utilise <code>const</code>/<code>let</code>.</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🔀 Conditions — prendre des décisions</h2>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript</div></div>
    <pre><code><span class="kw">const</span> age = <span class="num">17</span>;

<span class="cm">// Structure if / else if / else</span>
<span class="kw">if</span> (age >= <span class="num">18</span>) {
  console.<span class="fn">log</span>(<span class="str">"Tu es majeur(e)."</span>);
} <span class="kw">else if</span> (age >= <span class="num">16</span>) {
  console.<span class="fn">log</span>(<span class="str">"Tu es presque majeur(e)."</span>);
} <span class="kw">else</span> {
  console.<span class="fn">log</span>(<span class="str">"Tu es mineur(e)."</span>);
}
<span class="cm">// → "Tu es presque majeur(e)."</span>

<span class="cm">// Opérateurs de comparaison</span>
<span class="num">5</span> === <span class="num">5</span>    <span class="cm">// ÉGALITÉ STRICTE (valeur ET type) → true</span>
<span class="num">5</span> == <span class="str">"5"</span>   <span class="cm">// égalité lâche (juste valeur) → true  ← ÉVITER</span>
<span class="num">5</span> !== <span class="num">6</span>   <span class="cm">// différent strict → true</span>
<span class="num">5</span> > <span class="num">3</span>     <span class="cm">// supérieur → true</span>
<span class="num">5</span> >= <span class="num">5</span>    <span class="cm">// supérieur ou égal → true</span>

<span class="cm">// Opérateurs logiques</span>
<span class="kw">true</span> && <span class="kw">false</span>   <span class="cm">// ET logique → false (les DEUX doivent être vrais)</span>
<span class="kw">true</span> || <span class="kw">false</span>   <span class="cm">// OU logique → true (au moins UN doit être vrai)</span>
!<span class="kw">true</span>           <span class="cm">// NON logique → false (inverse)</span>

<span class="cm">// Exemple réel : vérifier si un utilisateur peut accéder à un contenu</span>
<span class="kw">const</span> estConnecte = <span class="kw">true</span>;
<span class="kw">const</span> estAdmin = <span class="kw">false</span>;

<span class="kw">if</span> (estConnecte && estAdmin) {
  console.<span class="fn">log</span>(<span class="str">"Accès au panneau d'administration"</span>);
} <span class="kw">else if</span> (estConnecte) {
  console.<span class="fn">log</span>(<span class="str">"Bienvenue, utilisateur standard"</span>);
} <span class="kw">else</span> {
  console.<span class="fn">log</span>(<span class="str">"Veuillez vous connecter"</span>);
}</code></pre>
  </div>
</div>

<div class="content-section">
  <h2>🔄 Boucles — répéter sans effort</h2>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript</div></div>
    <pre><code><span class="cm">// ── Boucle FOR — quand on sait combien de fois ──</span>
<span class="kw">for</span> (<span class="kw">let</span> i = <span class="num">0</span>; i < <span class="num">5</span>; i++) {
  console.<span class="fn">log</span>(<span class="str">&#96;Tour numéro \$${i}&#96;</span>);
}
<span class="cm">// Affiche : Tour numéro 0, 1, 2, 3, 4</span>
<span class="cm">// i=0 : commence à 0</span>
<span class="cm">// i<5 : continue tant que i est inférieur à 5</span>
<span class="cm">// i++ : ajoute 1 à i après chaque tour</span>

<span class="cm">// ── Parcourir un tableau (array) ──</span>
<span class="kw">const</span> fruits = [<span class="str">"pomme"</span>, <span class="str">"banane"</span>, <span class="str">"orange"</span>];

<span class="cm">// for...of (le plus lisible pour les tableaux)</span>
<span class="kw">for</span> (<span class="kw">const</span> fruit <span class="kw">of</span> fruits) {
  console.<span class="fn">log</span>(<span class="str">&#96;J'aime les \$${fruit}s&#96;</span>);
}

<span class="cm">// forEach — méthode de tableau</span>
fruits.<span class="fn">forEach</span>((fruit, index) => {
  console.<span class="fn">log</span>(<span class="str">&#96;\$${index + 1}. \$${fruit}&#96;</span>);
});
<span class="cm">// 1. pomme  2. banane  3. orange</span>

<span class="cm">// ── Boucle WHILE — quand on ne sait pas combien de fois ──</span>
<span class="kw">let</span> essais = <span class="num">0</span>;
<span class="kw">while</span> (essais < <span class="num">3</span>) {
  console.<span class="fn">log</span>(<span class="str">"Tentative de connexion..."</span>);
  essais++;
}
<span class="cm">// Attention : toujours s'assurer que la condition finit par être fausse</span>
<span class="cm">// sinon → boucle infinie → navigateur planté !</span></code></pre>
  </div>
</div>

<div class="quiz-section">
  <div class="quiz-title">🎯 Quiz — Variables et logique</div>
  <div class="quiz-subtitle">Sois précis(e) — en programmation, chaque caractère compte.</div>
