<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(196,125,14,.1);color:#c47d0e;">Module 2 · JavaScript</span>
  <h1 class="lh-title">Fonctions — organiser et réutiliser son code</h1>
  <p class="lh-intro">Une fonction, c'est comme une machine : tu lui donnes des ingrédients, elle les traite, et te rend un résultat. C'est le bloc de construction fondamental de tout programme sérieux.</p>
  <div class="lh-meta"><span>⏱ 35 min</span><span>📖 JS Fonctions</span><span>🎯 Débutant → Intermédiaire</span></div>
</div>

<div class="content-section">
  <h2>🔧 Pourquoi les fonctions ?</h2>

  <p>Imagine que tu construis un site e-commerce. Tu dois calculer le prix total d'une commande à 15 endroits différents dans ton code. Sans fonctions, tu copies-colles le même calcul 15 fois. Si demain la TVA change de 20% à 21%, tu dois modifier 15 endroits... et en oublier certains. Avec une fonction, tu modifies 1 seul endroit.</p>

  <div class="callout analogy">
    <div class="callout-icon">🏭</div>
    <div class="callout-body">
      <strong>Une fonction = une machine avec des entrées et une sortie</strong>
      <p>Une machine à café a des entrées (eau, café, bouton) et une sortie (café chaud). Tu n'as pas besoin de savoir comment la machine fonctionne en interne pour l'utiliser. C'est pareil pour les fonctions : une fois définie, tu l'appelles simplement.</p>
    </div>
  </div>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript — Les 3 façons de déclarer une fonction</div></div>
    <pre><code><span class="cm">// ── 1. Déclaration de fonction (Function Declaration) ──</span>
<span class="cm">// Avantage : "hoistée" (accessible avant sa déclaration dans le code)</span>
<span class="kw">function</span> <span class="fn">calculerTVA</span>(prixHT) {
  <span class="kw">const</span> tva = prixHT * <span class="num">0.20</span>;
  <span class="kw">return</span> prixHT + tva;  <span class="cm">// return envoie le résultat</span>
}

<span class="cm">// Utilisation (on dit "appeler" ou "invoquer" une fonction)</span>
<span class="kw">const</span> prixFinal = <span class="fn">calculerTVA</span>(<span class="num">100</span>);  <span class="cm">// → 120</span>
console.<span class="fn">log</span>(prixFinal);              <span class="cm">// 120</span>

<span class="cm">// ── 2. Expression de fonction (Function Expression) ──</span>
<span class="kw">const</span> <span class="fn">saluer</span> = <span class="kw">function</span>(prenom) {
  <span class="kw">return</span> <span class="str">&#96;Bonjour, \$${prenom} !&#96;</span>;
};

<span class="cm">// ── 3. Arrow Function (ES6) — LA syntaxe moderne ──</span>
<span class="kw">const</span> <span class="fn">multiplier</span> = (a, b) => a * b;

<span class="cm">// Équivalent long :</span>
<span class="kw">const</span> <span class="fn">multiplierLong</span> = (a, b) => {
  <span class="kw">return</span> a * b;  <span class="cm">// return obligatoire avec les accolades</span>
};

<span class="cm">// Avec UN seul paramètre : les parenthèses sont optionnelles</span>
<span class="kw">const</span> <span class="fn">doubler</span> = n => n * <span class="num">2</span>;</code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">→</div><div class="ann-text">Les <strong>paramètres</strong> (entre parenthèses à la définition) sont des "cases vides" qui attendent des valeurs. Les <strong>arguments</strong> (entre parenthèses à l'appel) sont les vraies valeurs qu'on passe.</div></div>
      <div class="ann-line"><div class="ann-num">→</div><div class="ann-text"><strong>return</strong> arrête la fonction ET renvoie une valeur. Sans <code>return</code>, la fonction retourne <code>undefined</code>. Une fois que <code>return</code> est atteint, aucun code après n'est exécuté.</div></div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🎯 Paramètres par défaut et fonctions avancées</h2>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript</div></div>
    <pre><code><span class="cm">// ── Paramètres par défaut ──</span>
<span class="kw">function</span> <span class="fn">creerEmail</span>(destinataire, sujet = <span class="str">"Sans sujet"</span>, urgent = <span class="kw">false</span>) {
  <span class="kw">return</span> {
    to: destinataire,
    subject: urgent ? <span class="str">&#96;🚨 URGENT : \$${sujet}&#96;</span> : sujet
  };
}

<span class="fn">creerEmail</span>(<span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="72131e1b1117321f131b1e5c111d1f">[email&#160;protected]</a>"</span>);
<span class="cm">// → { to: "<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="93f2fffaf0f6d3fef2faffbdf0fcfe">[email&#160;protected]</a>", subject: "Sans sujet" }</span>

<span class="fn">creerEmail</span>(<span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="40222f22002d21292c6e232f2d">[email&#160;protected]</a>"</span>, <span class="str">"Réunion"</span>, <span class="kw">true</span>);
<span class="cm">// → { to: "<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="c4a6aba684a9a5ada8eaa7aba9">[email&#160;protected]</a>", subject: "🚨 URGENT : Réunion" }</span>

<span class="cm">// ── Fonctions d'ordre supérieur (Higher Order Functions) ──</span>
<span class="cm">// Une fonction peut RECEVOIR une autre fonction en paramètre</span>
<span class="kw">const</span> nombres = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>];

<span class="cm">// .map() — transformer chaque élément</span>
<span class="kw">const</span> doubles = nombres.<span class="fn">map</span>(n => n * <span class="num">2</span>);
<span class="cm">// → [2, 4, 6, 8, 10]</span>

<span class="cm">// .filter() — garder seulement certains éléments</span>
<span class="kw">const</span> pairs = nombres.<span class="fn">filter</span>(n => n % <span class="num">2</span> === <span class="num">0</span>);
<span class="cm">// → [2, 4]</span>

<span class="cm">// .reduce() — accumuler en une seule valeur</span>
<span class="kw">const</span> somme = nombres.<span class="fn">reduce</span>((acc, n) => acc + n, <span class="num">0</span>);
<span class="cm">// → 15  (0+1+2+3+4+5)</span>

<span class="cm">// .find() — trouver le premier élément correspondant</span>
<span class="kw">const</span> premier_pair = nombres.<span class="fn">find</span>(n => n % <span class="num">2</span> === <span class="num">0</span>);
<span class="cm">// → 2</span>

<span class="cm">// Enchaîner les méthodes</span>
<span class="kw">const</span> resultat = nombres
  .<span class="fn">filter</span>(n => n > <span class="num">2</span>)     <span class="cm">// [3, 4, 5]</span>
  .<span class="fn">map</span>(n => n * <span class="num">10</span>)       <span class="cm">// [30, 40, 50]</span>
  .<span class="fn">reduce</span>((a, n) => a + n, <span class="num">0</span>); <span class="cm">// 120</span></code></pre>
  </div>

  <div class="callout tip">
    <div class="callout-icon">💡</div>
    <div class="callout-body">
      <strong>map, filter, reduce — ton couteau suisse</strong>
      <p>Ces 3 méthodes remplacent 90% des boucles for en JavaScript moderne. Elles rendent le code plus <em>lisible</em>, plus <em>prévisible</em> et moins sujet aux bugs. Maîtrise-les et tu seras déjà meilleur(e) que la plupart des juniors.</p>

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(29,78,216,.1);color:#1d4ed8;">Module 3 · React.js</span>
  <h1 class="lh-title">Pourquoi React ? La révolution des composants</h1>
  <p class="lh-intro">React a changé la façon dont on construit des interfaces web. Avant de coder, comprends POURQUOI il existe — ça te donnera une intuition profonde pour tout ce qui suit.</p>
  <div class="lh-meta"><span>⏱ 20 min</span><span>📖 React</span><span>🎯 Intermédiaire</span></div>
</div>

<div class="content-section">
  <h2>❌ Le problème avant React</h2>

  <p>Avant React (avant 2013), on construisait les interfaces avec du HTML statique + JavaScript qui modifiait le DOM directement. Ça marchait, mais dès que l'interface devenait complexe, ça devenait un cauchemar à maintenir.</p>

  <div class="callout analogy">
    <div class="callout-icon">🏗️</div>
    <div class="callout-body">
      <strong>L'analogie parfaite : construire avec des LEGO</strong>
      <p>Avant React : tu construis une maison d'une seule pièce. Pour changer une fenêtre, tu dois démonter une partie du mur. Si tu veux 3 maisons identiques, tu reconstruis tout 3 fois à la main.</p>
      <p>Avec React : tu as des <strong>pièces LEGO standardisées</strong>. Un composant "Fenêtre" que tu peux utiliser partout. Si tu modifies le composant Fenêtre, TOUTES les fenêtres de toutes les maisons se mettent à jour automatiquement.</p>
    </div>
  </div>

  <h3>React en 3 principes</h3>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">Composants — découper l'UI en blocs réutilisables</div>
        <div class="step-desc">Chaque partie de l'interface est un composant : un bouton, une carte produit, une barre de navigation. Tu les assembles comme des LEGO pour construire des pages entières. Un composant peut être utilisé 100 fois sans réécrire de code.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">État réactif — l'interface se met à jour automatiquement</div>
        <div class="step-desc">Quand une donnée change (ex: l'utilisateur ajoute un produit au panier), React met à jour AUTOMATIQUEMENT toutes les parties de l'interface qui dépendent de cette donnée. Tu n'as plus à chercher manuellement quel élément DOM modifier.</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">DOM Virtuel — performances optimisées</div>
        <div class="step-desc">React maintient une copie virtuelle du DOM. Quand quelque chose change, il compare l'ancien et le nouvel état, et met à jour UNIQUEMENT ce qui a changé dans le vrai DOM. Résultat : interfaces rapides même avec beaucoup de données.</div>
      </div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>⚛️ Ton premier composant React</h2>

  <p>Un composant React est une <strong>fonction JavaScript qui retourne du JSX</strong>. JSX ressemble à du HTML mais c'est du JavaScript qui sera transformé en appels de fonctions.</p>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">CarteUtilisateur.jsx</div><div class="code-lang">React / JSX</div></div>
    <pre><code><span class="cm">// Un composant = une fonction qui retourne du JSX</span>
<span class="kw">function</span> <span class="fn">CarteUtilisateur</span>({ nom, email, avatar, role }) {
  <span class="cm">// Logique JavaScript normale ici</span>
  <span class="kw">const</span> initiales = nom.<span class="fn">split</span>(<span class="str">' '</span>).<span class="fn">map</span>(n => n[<span class="num">0</span>]).<span class="fn">join</span>(<span class="str">''</span>);
  
  <span class="cm">// Le return contient du JSX</span>
  <span class="kw">return</span> (
    <span class="tag">&lt;div</span> <span class="attr">className</span>=<span class="val">"carte"</span><span class="tag">&gt;</span>

      <span class="cm">{/* Commentaire en JSX — entouré d'accolades */}</span>

      <span class="cm">{/* Expression JS dans JSX : entre accolades {} */}</span>
      {avatar
        ? <span class="tag">&lt;img</span> <span class="attr">src</span>={avatar} <span class="attr">alt</span>={nom} <span class="tag">/&gt;</span>
        : <span class="tag">&lt;div</span> <span class="attr">className</span>=<span class="val">"avatar-placeholder"</span><span class="tag">&gt;</span>{initiales}<span class="tag">&lt;/div&gt;</span>
      }

      <span class="tag">&lt;div</span> <span class="attr">className</span>=<span class="val">"infos"</span><span class="tag">&gt;</span>
        <span class="tag">&lt;h2&gt;</span>{nom}<span class="tag">&lt;/h2&gt;</span>
        <span class="tag">&lt;p&gt;</span>{email}<span class="tag">&lt;/p&gt;</span>
        <span class="tag">&lt;span</span> <span class="attr">className</span>={<span class="str">&#96;badge badge--\$${role}&#96;</span>}<span class="tag">&gt;</span>{role}<span class="tag">&lt;/span&gt;</span>
      <span class="tag">&lt;/div&gt;</span>

    <span class="tag">&lt;/div&gt;</span>
  );
}

<span class="cm">// Utilisation du composant :</span>
<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> utilisateurs = [
    { id: <span class="num">1</span>, nom: <span class="str">"Alice Dupont"</span>, email: <span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="06676a6f6563466b676f6a2865696b">[email&#160;protected]</a>"</span>, role: <span class="str">"admin"</span>   },
    { id: <span class="num">2</span>, nom: <span class="str">"Bob Martin"</span>,  email: <span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="bfddd0ddffd2ded6d391dcd0d2">[email&#160;protected]</a>"</span>,   role: <span class="str">"editor"</span>  },
  ];

  <span class="kw">return</span> (
    <span class="tag">&lt;div</span> <span class="attr">className</span>=<span class="val">"liste-cartes"</span><span class="tag">&gt;</span>
      {utilisateurs.<span class="fn">map</span>(user => (
        <span class="tag">&lt;CarteUtilisateur</span>
          <span class="attr">key</span>={user.id}        <span class="cm">{/* OBLIGATOIRE pour les listes */}</span>
          <span class="attr">nom</span>={user.nom}
          <span class="attr">email</span>={user.email}
          <span class="attr">role</span>={user.role}
        <span class="tag">/&gt;</span>
      ))}
    <span class="tag">&lt;/div&gt;</span>
  );
}</code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">①</div><div class="ann-text"><code>className</code> au lieu de <code>class</code> — En JSX, on utilise <code>className</code> car <code>class</code> est un mot réservé en JavaScript.</div></div>
      <div class="ann-line"><div class="ann-num">②</div><div class="ann-text">Les <strong>props</strong> (propriétés) sont les paramètres du composant. C'est ainsi qu'on passe des données d'un composant parent vers un enfant.</div></div>
      <div class="ann-line"><div class="ann-num">③</div><div class="ann-text">L'attribut <code>key</code> est obligatoire quand on génère une liste de composants. Il aide React à identifier lesquels ont changé.</div></div>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🔄 useState — rendre l'interface vivante</h2>

  <p>L'<strong>état</strong> (state) c'est une donnée qui peut changer, et qui, quand elle change, fait automatiquement re-rendre le composant. C'est le cœur de React.</p>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">Compteur.jsx</div><div class="code-lang">React</div></div>
    <pre><code><span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">Compteur</span>() {
  <span class="cm">// useState(valeurInitiale) retourne [valeurActuelle, fonctionPourChanger]</span>
  <span class="kw">const</span> [compte, setCompte] = <span class="fn">useState</span>(<span class="num">0</span>);

  <span class="cm">// Quand setCompte est appelé, React re-rend le composant</span>
  <span class="cm">// avec la nouvelle valeur de "compte"</span>

  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      <span class="tag">&lt;p&gt;</span>Compte actuel : <span class="tag">&lt;strong&gt;</span>{compte}<span class="tag">&lt;/strong&gt;&lt;/p&gt;</span>

      <span class="tag">&lt;button</span> <span class="attr">onClick</span>={() => <span class="fn">setCompte</span>(compte + <span class="num">1</span>)}<span class="tag">&gt;</span>
        + Ajouter
      <span class="tag">&lt;/button&gt;</span>

      <span class="tag">&lt;button</span> <span class="attr">onClick</span>={() => <span class="fn">setCompte</span>(compte - <span class="num">1</span>)}<span class="tag">&gt;</span>
        - Retirer
      <span class="tag">&lt;/button&gt;</span>

      <span class="tag">&lt;button</span> <span class="attr">onClick</span>={() => <span class="fn">setCompte</span>(<span class="num">0</span>)}<span class="tag">&gt;</span>
        Réinitialiser
      <span class="tag">&lt;/button&gt;</span>
    <span class="tag">&lt;/div&gt;</span>
  );
}

<span class="cm">// ── Exemple plus réaliste : formulaire de recherche ──</span>
<span class="kw">function</span> <span class="fn">RechercheUtilisateurs</span>() {
  <span class="kw">const</span> [recherche, setRecherche] = <span class="fn">useState</span>(<span class="str">''</span>);
  <span class="kw">const</span> tous = [<span class="str">"Alice"</span>, <span class="str">"Bob"</span>, <span class="str">"Charlie"</span>, <span class="str">"Diana"</span>];

  <span class="kw">const</span> filtres = tous.<span class="fn">filter</span>(nom =>
    nom.<span class="fn">toLowerCase</span>().<span class="fn">includes</span>(recherche.<span class="fn">toLowerCase</span>())
  );

  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      <span class="tag">&lt;input</span>
        <span class="attr">type</span>=<span class="val">"text"</span>
        <span class="attr">placeholder</span>=<span class="val">"Rechercher..."</span>
        <span class="attr">value</span>={recherche}
        <span class="attr">onChange</span>={e => <span class="fn">setRecherche</span>(e.target.value)}
      <span class="tag">/&gt;</span>
      <span class="tag">&lt;ul&gt;</span>
        {filtres.<span class="fn">map</span>(nom => <span class="tag">&lt;li</span> <span class="attr">key</span>={nom}<span class="tag">&gt;</span>{nom}<span class="tag">&lt;/li&gt;</span>)}
      <span class="tag">&lt;/ul&gt;</span>
    <span class="tag">&lt;/div&gt;</span>
  );
}</code></pre>
  </div>
</div>
</template>

<div class="lesson-header-area">
  <span class="lh-module-tag" style="background:rgba(26,107,58,.1);color:#1a6b3a;">Module 4 · Node.js</span>
  <h1 class="lh-title">Le backend : ce qui se passe côté serveur</h1>
  <p class="lh-intro">Jusqu'ici tu as appris le frontend : ce que l'utilisateur voit. Le backend, c'est le cerveau invisible derrière. C'est là que les données sont stockées, les règles métier appliquées, et la sécurité garantie.</p>

<div class="content-section">
  <h2>🧩 Frontend vs Backend</h2>

  <p>Un développeur web travaille sur deux "mondes" très différents qui doivent communiquer entre eux via une API.</p>

  <div class="diagram">
    <div class="diagram-title">Architecture d'une application web</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">

        <div style="font-size:.75rem;color:#7a6f5e;margin-top:4px;">Node.js + Express<br>La logique métier</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div style="font-size:1.2rem;">⇌</div>

      <p><strong>Frontend (navigateur)</strong> = La salle du restaurant, les menus, le décor. C'est ce que le client voit.</p>
      <p><strong>Backend (serveur)</strong> = La cuisine. Le client ne peut pas y aller, mais c'est là que se passe la vraie action : préparer la commande, vérifier les stocks, calculer la facture.</p>
      <p><strong>Base de données</strong> = Le garde-manger et les fiches clients. Tout est stocké de façon permanente.</p>
      <p><strong>API</strong> = Le serveur (la personne, pas le serveur informatique) qui fait l'aller-retour entre la salle et la cuisine.</p>
    </div>
  </div>
</div>

<div class="content-section">
  <h2>🚀 Créer un serveur avec Node.js & Express</h2>

  <div class="code-block">
    <div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">server.js</div><div class="code-lang">Node.js / Express</div></div>
    <pre><code><span class="cm">// ── Installation (dans le terminal) ──</span>
<span class="cm">// npm init -y</span>
<span class="cm">// npm install express</span>

<span class="kw">const</span> express = <span class="fn">require</span>(<span class="str">'express'</span>);
<span class="kw">const</span> app     = <span class="fn">express</span>();

<span class="cm">// MIDDLEWARE — traitement des requêtes avant les routes</span>
app.<span class="fn">use</span>(express.<span class="fn">json</span>());  <span class="cm">// Permet de lire le body JSON des requêtes</span>

<span class="cm">// Middleware de log personnalisé</span>
app.<span class="fn">use</span>((req, res, next) => {
  console.<span class="fn">log</span>(<span class="str">&#96;\$${req.method} \$${req.url} — \$${new Date().toISOString()}&#96;</span>);
  <span class="fn">next</span>(); <span class="cm">// Passe à la route suivante</span>
});

<span class="cm">// DONNÉES EN MÉMOIRE (simulation de BDD pour l'exemple)</span>
<span class="kw">let</span> utilisateurs = [
  { id: <span class="num">1</span>, nom: <span class="str">"Alice Dupont"</span>, email: <span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="adccc1c4cec8edc0ccc4c183cec2c0">[email&#160;protected]</a>"</span>, role: <span class="str">"admin"</span>  },
  { id: <span class="num">2</span>, nom: <span class="str">"Bob Martin"</span>,   email: <span class="str">"<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="7e1c111c3e131f1712501d1113">[email&#160;protected]</a>"</span>,   role: <span class="str">"user"</span>   },
];

<span class="cm">// ── LES ROUTES CRUD ──</span>

<span class="cm">// GET /api/users — Lire tous les utilisateurs</span>
app.<span class="fn">get</span>(<span class="str">'/api/users'</span>, (req, res) => {
  <span class="cm">// On peut filtrer par query params : /api/users?role=admin</span>
  <span class="kw">const</span> { role } = req.query;
  <span class="kw">const</span> resultat = role
    ? utilisateurs.<span class="fn">filter</span>(u => u.role === role)
    : utilisateurs;
  res.<span class="fn">json</span>(resultat);
});

<span class="cm">// GET /api/users/:id — Lire un utilisateur spécifique</span>
app.<span class="fn">get</span>(<span class="str">'/api/users/:id'</span>, (req, res) => {
  <span class="kw">const</span> user = utilisateurs.<span class="fn">find</span>(u => u.id === +req.params.id);
  <span class="kw">if</span> (!user) {
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">404</span>).<span class="fn">json</span>({ message: <span class="str">"Utilisateur introuvable"</span> });
  }
  res.<span class="fn">json</span>(user);
});

<span class="cm">// POST /api/users — Créer un utilisateur</span>
app.<span class="fn">post</span>(<span class="str">'/api/users'</span>, (req, res) => {
  <span class="kw">const</span> { nom, email } = req.body;

  <span class="cm">// Validation basique</span>
  <span class="kw">if</span> (!nom || !email) {
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">400</span>).<span class="fn">json</span>({ message: <span class="str">"nom et email sont obligatoires"</span> });
  }

  <span class="kw">const</span> nouvelUser = {
    id: utilisateurs.<span class="fn">length</span> + <span class="num">1</span>,
    nom,
    email,
    role: <span class="str">"user"</span>
  };
  utilisateurs.<span class="fn">push</span>(nouvelUser);
  res.<span class="fn">status</span>(<span class="num">201</span>).<span class="fn">json</span>(nouvelUser); <span class="cm">// 201 = Created</span>
});

<span class="cm">// DELETE /api/users/:id — Supprimer</span>
app.<span class="fn">delete</span>(<span class="str">'/api/users/:id'</span>, (req, res) => {
  <span class="kw">const</span> index = utilisateurs.<span class="fn">findIndex</span>(u => u.id === +req.params.id);
  <span class="kw">if</span> (index === -<span class="num">1</span>) <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">404</span>).<span class="fn">json</span>({ message: <span class="str">"Introuvable"</span> });
  utilisateurs.<span class="fn">splice</span>(index, <span class="num">1</span>);
  res.<span class="fn">status</span>(<span class="num">204</span>).<span class="fn">send</span>(); <span class="cm">// 204 = No Content</span>
});

<span class="cm">// Démarrage du serveur</span>
app.<span class="fn">listen</span>(<span class="num">3000</span>, () => {
  console.<span class="fn">log</span>(<span class="str">'🚀 Serveur démarré sur http://localhost:3000'</span>);
});</code></pre>
    <div class="code-annotation">
      <div class="ann-line"><div class="ann-num">①</div><div class="ann-text">Les <strong>codes HTTP</strong> sont standardisés : 200=OK, 201=Créé, 400=Requête invalide, 401=Non authentifié, 403=Interdit, 404=Introuvable, 500=Erreur serveur.</div></div>
      <div class="ann-line"><div class="ann-num">②</div><div class="ann-text"><strong>Middleware</strong> : une fonction qui s'exécute entre la requête et la réponse. Tu peux en chaîner autant que tu veux. Utile pour l'authentification, les logs, la validation…</div></div>
      <div class="ann-line"><div class="ann-num">③</div><div class="ann-text"><code>req.params.id</code> récupère <code>:id</code> dans l'URL. <code>req.query</code> récupère les paramètres après <code>?</code>. <code>req.body</code> récupère le body JSON de la requête POST/PUT.</div></div>
    </div>
  </div>

  <div class="callout tip">

  document.<span class="fn">getElementById</span>(<span class="str">'humidity'</span>).textContent   = <span class="str">&#96;💧 \$${data.main.humidity}%&#96;</span>;
  document.<span class="fn">getElementById</span>(<span class="str">'wind'</span>).textContent       = <span class="str">&#96;💨 \$${data.wind.speed} km/h&#96;</span>;

  <span class="kw">const</span> iconCode = data.weather[0].icon;
  document.<span class="fn">getElementById</span>(<span class="str">'weatherIcon'</span>).src =
    <span class="str">&#96;https://openweathermap.org/img/wn/\$${iconCode}@2x.png&#96;</span>;

</div>

<div class="project-banner mini">
  <div class="pb-eyebrow">✦ Mini-Projet 04</div>
  <div class="pb-title">Quiz Interactif<br>avec Timer &amp; Score</div>
  <div class="pb-desc">10 questions, 30 secondes par question, barre de progression, score final avec message personnalisé selon le résultat.</div>
  <div class="pb-meta">
    <span class="pb-pill">⚡ JavaScript</span>
    <span class="pb-pill">⏱ Timer</span>
    <span class="pb-pill">📊 Score</span>
    <span class="pb-pill">🔀 Questions mélangées</span>
  </div>
</div>

<div class="content-section">
  <h2>🏗️ Architecture du projet</h2>
  <div class="project-steps">
    <div class="project-step">
      <div class="ps-title">Les données — tableau de questions</div>
      <div class="ps-code">
        <div class="code-block"><div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript</div></div>
<pre><code><span class="kw">const</span> questions = [
  {
    question: <span class="str">"Quelle balise HTML définit un lien hypertexte ?"</span>,
    options: [<span class="str">"&lt;link&gt;"</span>, <span class="str">"&lt;a&gt;"</span>, <span class="str">"&lt;href&gt;"</span>, <span class="str">"&lt;url&gt;"</span>],
    reponse: <span class="num">1</span>  <span class="cm">// index de la bonne réponse</span>
  },
  {
    question: <span class="str">"Quelle propriété CSS centre du texte ?"</span>,
    options: [<span class="str">"align: center"</span>, <span class="str">"text-align: center"</span>, <span class="str">"center: true"</span>, <span class="str">"font-align: center"</span>],
    reponse: <span class="num">1</span>
  },
  {
    question: <span class="str">"Que retourne typeof null en JS ?"</span>,
    options: [<span class="str">"null"</span>, <span class="str">"undefined"</span>, <span class="str">"object"</span>, <span class="str">"boolean"</span>],
    reponse: <span class="num">2</span>
  }
  <span class="cm">// Ajoute 7 autres questions !</span>
];

<span class="cm">// Mélanger les questions</span>
<span class="kw">const</span> qMelangees = [...questions].<span class="fn">sort</span>(() => Math.<span class="fn">random</span>() - <span class="num">0.5</span>);</code></pre></div>
      </div>
    </div>

    <div class="project-step">
      <div class="ps-title">Logique principale du quiz</div>
      <div class="ps-code">
        <div class="code-block"><div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-lang">JavaScript</div></div>
<pre><code><span class="kw">let</span> indexActuel = <span class="num">0</span>;
<span class="kw">let</span> score       = <span class="num">0</span>;
<span class="kw">let</span> timer       = <span class="kw">null</span>;
<span class="kw">let</span> tempsRestant = <span class="num">30</span>;

<span class="kw">function</span> <span class="fn">afficherQuestion</span>() {
  <span class="kw">const</span> q = qMelangees[indexActuel];

  document.<span class="fn">getElementById</span>(<span class="str">'question-text'</span>).textContent = q.question;
  document.<span class="fn">getElementById</span>(<span class="str">'progress'</span>).textContent =
    <span class="str">&#96;Question \$${indexActuel + 1} / \$${qMelangees.length}&#96;</span>;

  <span class="kw">const</span> optionsDiv = document.<span class="fn">getElementById</span>(<span class="str">'options'</span>);
  optionsDiv.innerHTML = <span class="str">''</span>;

  q.options.<span class="fn">forEach</span>((opt, i) => {
    <span class="kw">const</span> btn = document.<span class="fn">createElement</span>(<span class="str">'button'</span>);
    btn.className   = <span class="str">'option-btn'</span>;
    btn.textContent = opt;
    btn.onclick = () => <span class="fn">verifierReponse</span>(i);
    optionsDiv.<span class="fn">appendChild</span>(btn);
  });

  <span class="fn">demarrerTimer</span>();
}

<span class="kw">function</span> <span class="fn">verifierReponse</span>(indexChoisi) {
  <span class="fn">clearInterval</span>(timer);
  <span class="kw">const</span> q       = qMelangees[indexActuel];
  <span class="kw">const</span> correct = indexChoisi === q.reponse;

  <span class="kw">if</span> (correct) score++;

  <span class="cm">// Affiche feedback visuel</span>
  <span class="kw">const</span> btns = document.<span class="fn">querySelectorAll</span>(<span class="str">'.option-btn'</span>);
  btns[q.reponse].<span class="fn">classList</span>.<span class="fn">add</span>(<span class="str">'correct'</span>);
  <span class="kw">if</span> (!correct) btns[indexChoisi].<span class="fn">classList</span>.<span class="fn">add</span>(<span class="str">'wrong'</span>);

  <span class="cm">// Question suivante après 1.2s</span>
  <span class="fn">setTimeout</span>(() => {
    indexActuel++;
    <span class="kw">if</span> (indexActuel < qMelangees.length) {
      <span class="fn">afficherQuestion</span>();
    } <span class="kw">else</span> {
      <span class="fn">afficherResultat</span>();
    }
  }, <span class="num">1200</span>);
}

<span class="kw">function</span> <span class="fn">demarrerTimer</span>() {
  tempsRestant = <span class="num">30</span>;
  <span class="fn">clearInterval</span>(timer);
  timer = <span class="fn">setInterval</span>(() => {
    tempsRestant--;
    document.<span class="fn">getElementById</span>(<span class="str">'timer'</span>).textContent = tempsRestant;
    <span class="kw">if</span> (tempsRestant === <span class="num">0</span>) <span class="fn">verifierReponse</span>(-<span class="num">1</span>); <span class="cm">// Timeout</span>
  }, <span class="num">1000</span>);
}

<span class="kw">function</span> <span class="fn">afficherResultat</span>() {
  <span class="kw">const</span> pct = Math.<span class="fn">round</span>(score / qMelangees.length * <span class="num">100</span>);
  <span class="kw">const</span> msg = pct >= <span class="num">80</span> ? <span class="str">"🏆 Excellent !"</span>
             : pct >= <span class="num">50</span> ? <span class="str">"👍 Bien joué !"</span>
             : <span class="str">"📚 Continue à apprendre !"</span>;
  document.<span class="fn">getElementById</span>(<span class="str">'resultat'</span>).innerHTML =
    <span class="str">&#96;&lt;h2&gt;\$${msg}&lt;/h2&gt;&lt;p&gt;Score : \$${score}/\$${qMelangees.length} (\$${pct}%)&lt;/p&gt;&#96;</span>;
}

<span class="fn">afficherQuestion</span>();</code></pre></div>
      </div>
    </div>
  </div>
</div>

  <h3>Le modèle User complet</h3>
  <div class="code-block"><div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">src/models/User.js</div><div class="code-lang">JavaScript</div></div>
<pre><code><span class="kw">const</span> mongoose = <span class="fn">require</span>(<span class="str">'mongoose'</span>);
<span class="kw">const</span> bcrypt   = <span class="fn">require</span>(<span class="str">'bcrypt'</span>);

<span class="kw">const</span> userSchema = <span class="kw">new</span> mongoose.<span class="fn">Schema</span>({
  nom:          { type: String, required: <span class="kw">true</span>, trim: <span class="kw">true</span> },
  email:        { type: String, required: <span class="kw">true</span>, unique: <span class="kw">true</span>, lowercase: <span class="kw">true</span> },
  motDePasse:   { type: String, required: <span class="kw">true</span>, minlength: <span class="num">8</span> },
  avatar:       { type: String, default: <span class="str">''</span> },
  bio:          { type: String, maxlength: <span class="num">300</span> },
  competences:  [{ type: String }],
  github:       { type: String },
  linkedin:     { type: String },
  abonnes:      [{ type: mongoose.Schema.Types.ObjectId, ref: <span class="str">'User'</span> }],
  abonnements:  [{ type: mongoose.Schema.Types.ObjectId, ref: <span class="str">'User'</span> }],
}, { timestamps: <span class="kw">true</span> });

<span class="cm">// Hash le mot de passe AVANT la sauvegarde</span>
userSchema.<span class="fn">pre</span>(<span class="str">'save'</span>, <span class="kw">async function</span>(next) {
  <span class="kw">if</span> (!<span class="kw">this</span>.<span class="fn">isModified</span>(<span class="str">'motDePasse'</span>)) <span class="kw">return</span> <span class="fn">next</span>();
  <span class="kw">this</span>.motDePasse = <span class="kw">await</span> bcrypt.<span class="fn">hash</span>(<span class="kw">this</span>.motDePasse, <span class="num">12</span>);
  <span class="fn">next</span>();
});

<span class="cm">// Méthode pour vérifier le mot de passe</span>
userSchema.methods.<span class="fn">verifierMDP</span> = <span class="kw">function</span>(mdpEnClair) {
  <span class="kw">return</span> bcrypt.<span class="fn">compare</span>(mdpEnClair, <span class="kw">this</span>.motDePasse);
};

module.exports = mongoose.<span class="fn">model</span>(<span class="str">'User'</span>, userSchema);</code></pre></div>

  <h3>Routes d'authentification</h3>
  <div class="code-block"><div class="code-header"><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div><div class="code-filename">src/routes/auth.js</div><div class="code-lang">JavaScript</div></div>
<pre><code><span class="kw">const</span> express = <span class="fn">require</span>(<span class="str">'express'</span>);
<span class="kw">const</span> jwt     = <span class="fn">require</span>(<span class="str">'jsonwebtoken'</span>);
<span class="kw">const</span> User    = <span class="fn">require</span>(<span class="str">'../models/User'</span>);
<span class="kw">const</span> router  = express.<span class="fn">Router</span>();

<span class="cm">// POST /api/auth/register</span>
router.<span class="fn">post</span>(<span class="str">'/register'</span>, <span class="kw">async</span> (req, res) => {
  <span class="kw">try</span> {
    <span class="kw">const</span> { nom, email, motDePasse } = req.body;

    <span class="kw">const</span> existeDeja = <span class="kw">await</span> User.<span class="fn">findOne</span>({ email });
    <span class="kw">if</span> (existeDeja) <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">409</span>).<span class="fn">json</span>({ message: <span class="str">'Email déjà utilisé'</span> });

    <span class="kw">const</span> user  = <span class="kw">await</span> User.<span class="fn">create</span>({ nom, email, motDePasse });
    <span class="kw">const</span> token = jwt.<span class="fn">sign</span>({ id: user._id }, process.env.JWT_SECRET, { expiresIn: <span class="str">'7d'</span> });

    res.<span class="fn">status</span>(<span class="num">201</span>).<span class="fn">json</span>({ token, user: { id: user._id, nom: user.nom, email: user.email } });
  } <span class="kw">catch</span> (err) {
    res.<span class="fn">status</span>(<span class="num">500</span>).<span class="fn">json</span>({ message: err.message });
  }
});

<span class="cm">// POST /api/auth/login</span>
router.<span class="fn">post</span>(<span class="str">'/login'</span>, <span class="kw">async</span> (req, res) => {
  <span class="kw">try</span> {
    <span class="kw">const</span> { email, motDePasse } = req.body;
    <span class="kw">const</span> user = <span class="kw">await</span> User.<span class="fn">findOne</span>({ email });

    <span class="kw">if</span> (!user || !(<span class="kw">await</span> user.<span class="fn">verifierMDP</span>(motDePasse)))
      <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ message: <span class="str">'Identifiants incorrects'</span> });

    <span class="kw">const</span> token = jwt.<span class="fn">sign</span>({ id: user._id }, process.env.JWT_SECRET, { expiresIn: <span class="str">'7d'</span> });
    res.<span class="fn">json</span>({ token, user: { id: user._id, nom: user.nom, avatar: user.avatar } });
  } <span class="kw">catch</span> (err) {
    res.<span class="fn">status</span>(<span class="num">500</span>).<span class="fn">json</span>({ message: err.message });
  }
});

module.exports = router;</code></pre></div>

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
currentModule  = null;
currentLesson  = null;
completed      = new Set();
quizAnswered   = {};

function getTotalLessons() { return MODULES.reduce((s,m) => s + m.lessons.length, 0); }

/* ══════════════════════════════════════════════════════════
   BUILD SIDEBAR NAV
══════════════════════════════════════════════════════════ */
function buildNav() {
  const navModules = document.getElementById('navModules');
  navModules.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const div = document.createElement('div');
    div.className = 'nav-module';
    div.id = 'navmod-' + mi;

    const btn = document.createElement('button');
    btn.className = 'nav-module-btn';
    btn.innerHTML = `
      <div class="nav-module-icon" style="background:${mod.bg};">${mod.icon}</div>
      ${mod.title}
    `;
    btn.onclick = () => {
      div.classList.toggle('open');
      openLesson(mi, 0);
      if (window.innerWidth <= 768) { /* keep open to show lessons */ }
    };

    const lessonsDiv = document.createElement('div');
    lessonsDiv.className = 'nav-lessons';

    mod.lessons.forEach((les, li) => {
      const lesBtn = document.createElement('button');
      lesBtn.className = 'nav-lesson-btn';
      lesBtn.id = `navles-${mi}-${li}`;
      lesBtn.innerHTML = `
        <div class="nlb-check" id="check-${mi}-${li}">✓</div>
        <span class="nlb-text">${les.title}</span>
      `;
      lesBtn.onclick = (e) => {
        e.stopPropagation();
        if (window.innerWidth <= 768) closeSidebar();
        openLesson(mi, li);
      };
      lessonsDiv.appendChild(lesBtn);
    });

    div.appendChild(btn);
    div.appendChild(lessonsDiv);
    navModules.appendChild(div);
  });
}

/* ══════════════════════════════════════════════════════════
   HOME
══════════════════════════════════════════════════════════ */
function showHome() {
  if (window.innerWidth <= 768) closeSidebar();
  currentModule = null;
  currentLesson = null;
  var cb = document.getElementById('completeBtn'); if (cb) cb.style.display = 'none';
  document.getElementById('breadcrumb').innerHTML = `<span>DevMaster</span> › <strong>Accueil</strong>`;

  // Clear active states
  document.querySelectorAll('.nav-module-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-lesson-btn').forEach(b => b.classList.remove('active'));

  const total = getTotalLessons();
  const done  = completed.size;

  let modulesHTML = MODULES.map((mod, mi) => {
    const modDone = mod.lessons.filter((_, li) => completed.has(`${mi}-${li}`)).length;
    const pct = mod.lessons.length ? Math.round(modDone / mod.lessons.length * 100) : 0;
    return `
      <div class="module-overview-card" onclick="openLesson(${mi}, 0)">

        <div class="moc-body">
          <div class="moc-number">Module ${mi + 1}</div>
          <div class="moc-title">${mod.title}</div>
          <div class="moc-desc">${mod.desc}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="moc-count">${mod.lessons.length} leçon${mod.lessons.length > 1 ? 's' : ''}</div>
          <div class="moc-bar-wrap" style="margin-top:6px;">
            <div class="moc-bar">
              <div class="moc-bar-fill" style="width:${pct}%;background:${mod.color};"></div>
            </div>
            <div style="font-family:var(--mono);font-size:.68rem;color:var(--muted);margin-top:3px;">${pct}%</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('viewContainer').innerHTML = `
    <div class="home-view">
      <div class="home-hero">
        <div class="home-eyebrow">✦ Bienvenue sur DevMaster</div>
        <h1 class="home-title">
          De zéro à<br><em>développeur web</em><br>professionnel.
        </h1>
        <p class="home-desc">
          Un programme structuré, profondément pédagogique, avec des explications claires, 
          des analogies du monde réel, des exemples de code annotés et des exercices pratiques. 
          Conçu pour qu'un débutant absolu devienne un développeur employable.
        </p>
      </div>

      <div class="home-promise">
        <div class="promise-card">
          <div class="promise-icon">🎯</div>
          <div class="promise-title">Apprentissage progressif</div>
          <div class="promise-desc">Chaque concept est expliqué avec des analogies et des exemples du monde réel avant d'entrer dans le code.</div>
        </div>
        <div class="promise-card">
          <div class="promise-icon">💻</div>
          <div class="promise-title">Code annoté ligne par ligne</div>
          <div class="promise-desc">Chaque bloc de code est expliqué en détail. Tu sais POURQUOI chaque ligne existe, pas juste quoi écrire.</div>
        </div>
        <div class="promise-card">
          <div class="promise-icon">🏗️</div>
          <div class="promise-title">Projets concrets</div>
          <div class="promise-desc">Chaque module se termine par un projet réel que tu peux mettre dans ton portfolio dès maintenant.</div>
        </div>
      </div>

      <div style="background:var(--paper2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:36px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
        <div>
          <div style="font-weight:700;margin-bottom:4px;">Ta progression globale</div>
          <div style="font-size:.85rem;color:var(--muted);">${done} leçon${done > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''} sur ${total}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:var(--mono);font-size:1.8rem;font-weight:800;color:var(--accent);">${Math.round(done/total*100)||0}%</div>
        </div>
      </div>

      <h2 style="font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:20px;">📚 Programme complet</h2>
      <div class="modules-overview">
        ${modulesHTML}
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════
   OPEN LESSON
══════════════════════════════════════════════════════════ */
function openLesson(mi, li) {
  currentModule = mi;
  currentLesson = li;
  const mod = MODULES[mi];
  const les = mod.lessons[li];
  const key = `${mi}-${li}`;

  // Update nav
  document.querySelectorAll('.nav-module-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-lesson-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-module').forEach(d => d.classList.remove('open'));

  const navMod = document.getElementById(`navmod-${mi}`);
  if (navMod) { navMod.classList.add('open'); navMod.querySelector('.nav-module-btn').classList.add('active'); }
  const navLes = document.getElementById(`navles-${mi}-${li}`);
  if (navLes) navLes.classList.add('active');

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `<span onclick="showHome()" style="cursor:pointer;">DevMaster</span> › ${mod.icon} ${mod.title.split('—')[0].trim()} › <strong>${les.title}</strong>`;

  // Complete button
  const btn = document.getElementById('completeBtn');
  btn.style.display = 'flex';
  if (completed.has(key)) {
    btn.textContent = '✓ Terminé';
    btn.classList.add('done');
  } else {
    btn.textContent = '✓ Marquer comme terminé';
    btn.classList.remove('done');
  }

  // Content
  const isDone = completed.has(key);
  const hasPrev = li > 0 || mi > 0;
  const hasNext = li < mod.lessons.length - 1 || mi < MODULES.length - 1;

  document.getElementById('viewContainer').innerHTML = `
    <div class="lesson-view">
      ${les.getContent()}
      <div class="lesson-nav">
        <button class="nav-arrow" onclick="prevLesson()" ${!hasPrev ? 'disabled' : ''}>← Précédent</button>
        <button class="nav-arrow" onclick="markCurrentDone();nextLesson();" ${!hasNext ? 'disabled' : ''} style="background:var(--ink);color:#fff;border-color:var(--ink);">Suivant →</button>
      </div>
    </div>
  `;

  // Reset quiz state for this lesson
  quizAnswered = {};

  // Scroll to top
  document.querySelector('.main').scrollTo(0, 0);

  updateScrollProgress();
  wrapTables();
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function prevLesson() {
  if (currentLesson > 0) {
    openLesson(currentModule, currentLesson - 1);
  } else if (currentModule > 0) {
    const prevMod = currentModule - 1;
    openLesson(prevMod, MODULES[prevMod].lessons.length - 1);
  }
}

function nextLesson() {
  const mod = MODULES[currentModule];
  if (currentLesson < mod.lessons.length - 1) {
    openLesson(currentModule, currentLesson + 1);
  } else if (currentModule < MODULES.length - 1) {
    openLesson(currentModule + 1, 0);
  }
}

/* ══════════════════════════════════════════════════════════
   MARK DONE
══════════════════════════════════════════════════════════ */
function markCurrentDone() {
  if (currentModule === null) return;
  const key = `${currentModule}-${currentLesson}`;
  completed.add(key);

  var btn = document.getElementById('completeBtn');
  if (btn) { btn.textContent = '✓ Terminé'; btn.classList.add('done'); }

  // Update nav check
  const check = document.getElementById(`check-${currentModule}-${currentLesson}`);
  if (check) {
    const lesBtn = check.closest('.nav-lesson-btn');
    if (lesBtn) lesBtn.classList.add('done');
  }

  updateGlobalProgress();
}

/* ══════════════════════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════════════════════ */
function updateGlobalProgress() {
  const total = getTotalLessons();
  const done  = completed.size;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalPct').textContent = pct + '%';
}

function updateScrollProgress() {
  const main = document.querySelector('.main');
  main.onscroll = () => {
    const scrolled = main.scrollTop;
    const total = main.scrollHeight - main.clientHeight;
    const pct = total ? (scrolled / total * 100) : 0;
    document.getElementById('scrollBar').style.width = pct + '%';
  };
}

/* ══════════════════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════════════════ */
let quizCounter = 0;

function quiz(btn, isCorrect, explanation) {
  var optionsDiv = btn.closest('.quiz-options');
  if (!optionsDiv || optionsDiv.dataset.answered) return;
  optionsDiv.dataset.answered = '1';

  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    optionsDiv.querySelectorAll('.quiz-opt').forEach(function(b) {
      if (b !== btn && b.dataset.correct === 'true') {
        b.classList.add('correct');
      }
    });
  }

  var questionDiv = btn.closest('.quiz-question');
  if (questionDiv) {
    questionDiv.querySelectorAll('.quiz-feedback').forEach(function(f) {
      f.textContent = (isCorrect ? '✅ ' : '❌ ') + explanation;
      f.className = 'quiz-feedback show ' + (isCorrect ? 'ok' : 'ko');
    });
  }
}


/* ══════════════════════════════════════════════════════════
   EVENT DELEGATION — handles all data-action clicks safely
══════════════════════════════════════════════════════════ */
document.addEventListener('click', function(e) {

  /* ── Task checklist ── */
  var taskEl = e.target.closest('[data-action="check"]');
  if (taskEl) {
    taskEl.classList.toggle('done');
    taskEl.textContent = taskEl.classList.contains('done') ? '✓' : '';
    return;
  }

  /* ── Project checklist ── */
  var projEl = e.target.closest('[data-action="project-check"]');
  if (projEl) {
    toggleProjectCheck(projEl);
    return;
  }

  /* ── Quiz options ── */
  var quizBtn = e.target.closest('.quiz-opt[data-correct]');
  if (quizBtn) {
    var isCorrect   = quizBtn.dataset.correct === 'true';
    var explanation = quizBtn.dataset.msg || '';
    quiz(quizBtn, isCorrect, explanation);
    return;
  }

});




/* ══════════════════════════════════════════════════════════
   PROJECT CHECKLIST TOGGLE
══════════════════════════════════════════════════════════ */
function toggleProjectCheck(li) {
  li.classList.toggle('done-item');
  const check = li.querySelector('.pcheck');
  if (li.classList.contains('done-item')) {
    check.textContent = '✓';
    check.style.background = 'var(--accent2)';
    check.style.borderColor = 'var(--accent2)';
    check.style.color = '#fff';
  } else {
    check.textContent = '✓';
    check.style.background = '';
    check.style.borderColor = '';
    check.style.color = '';
  }
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR MOBILE
══════════════════════════════════════════════════════════ */
function toggleSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebarOverlay');
  const isOpen   = sidebar.classList.contains('open');
  if (isOpen) { closeSidebar(); } else { openSidebar(); }
}
function openSidebar() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebarOverlay');
  if (sb) sb.classList.add('open');
  if (ov) ov.classList.add('show');
  if (document.body) document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebarOverlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('show');
  if (document.body) document.body.style.overflow = '';
}
// Close sidebar on nav item click (mobile UX)
function navClick(mi, li) {
  if (window.innerWidth <= 768) closeSidebar();
  openLesson(mi, li);
}

/* Close sidebar on escape key */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSidebar();
});


/* ═══════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════
   TABLE RESPONSIVE WRAPPER
══════════════════════════════════════════════════════════ */
function wrapTables() {
  document.querySelectorAll('.compare-table').forEach(table => {
    if (table.parentElement.classList.contains('compare-table-wrap')) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'compare-table-wrap';
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });
}

/* ══════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  MODULES = buildModules();
  buildNav();
  showHome();
  updateGlobalProgress();
});
</script>
